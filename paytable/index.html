/**
 * Supported image MIME types for icon upload.
 */
var SUPPORTED_IMAGE_TYPES = ['image/png', 'image/jpeg', 'image/gif', 'image/webp'];

/**
 * Maximum image file size: 2MB
 */
var MAX_IMAGE_SIZE = 2 * 1024 * 1024;

/**
 * scanForIcons(pages)
 * Extracts unique icon names from bracket-notation [ICON_NAME] across all page items
 * and H/L symbol references on the PAYS page.
 *
 * @param {Array} pages - Array of PaytablePage objects with items
 * @returns {string[]} Array of unique icon names found
 */
function scanForIcons(pages) {
  if (!pages || !Array.isArray(pages) || pages.length === 0) return [];

  var iconsSet = {};
  var bracketPattern = /\[([A-Z][A-Z0-9_]*)\]/g;
  var hlPattern = /\b([HL]\d+)\b/gi;

  for (var i = 0; i < pages.length; i++) {
    var page = pages[i];
    if (!page || !page.items || !Array.isArray(page.items)) continue;

    var title = (page.title || '').toUpperCase();
    var titleEn = (page.titleEn || '').toUpperCase();
    var combined = title + ' ' + titleEn;
    var isPaysPage = /^PAYS\b/.test(combined) || /^赔付/.test(page.title || '') || /^符号/.test(page.title || '');

    for (var j = 0; j < page.items.length; j++) {
      var item = page.items[j];
      if (!item) continue;

      var texts = [];
      if (item.cn) texts.push(item.cn);
      if (item.en) texts.push(item.en);

      for (var t = 0; t < texts.length; t++) {
        var text = texts[t];

        // Extract bracket-notation references [ICON_NAME]
        bracketPattern.lastIndex = 0;
        var match;
        while ((match = bracketPattern.exec(text)) !== null) {
          iconsSet[match[1]] = true;
        }

        // On PAYS page, also extract H/L references
        if (isPaysPage) {
          hlPattern.lastIndex = 0;
          while ((match = hlPattern.exec(text)) !== null) {
            iconsSet[match[1].toUpperCase()] = true;
          }
        }
      }
    }
  }

  // Sort: special icons first (WILD, SCATTER, BONUS, LINK), then H-series, then L-series, then others
  var icons = Object.keys(iconsSet);
  icons.sort(function(a, b) {
    var order = function(name) {
      if (/^WILD/.test(name)) return 0;
      if (/^SCATTER/.test(name)) return 1;
      if (/^BONUS/.test(name)) return 2;
      if (/^LINK/.test(name)) return 3;
      if (/^H\d/.test(name)) return 4;
      if (/^L\d/.test(name)) return 5;
      return 6;
    };
    var diff = order(a) - order(b);
    if (diff !== 0) return diff;
    return a.localeCompare(b);
  });

  return icons;
}

/**
 * validateImage(file)
 * Validates that a file is a supported image format (PNG, JPG, GIF, WebP) and ≤ 2MB.
 *
 * @param {File} file - The file to validate
 * @returns {{ valid: boolean, error?: string }}
 */
function validateImage(file) {
  if (!file) {
    return { valid: false, error: '未选择文件' };
  }

  // Check MIME type
  var type = file.type || '';
  var isSupported = false;
  for (var i = 0; i < SUPPORTED_IMAGE_TYPES.length; i++) {
    if (type === SUPPORTED_IMAGE_TYPES[i]) {
      isSupported = true;
      break;
    }
  }

  if (!isSupported) {
    // Also check by file extension as fallback (some browsers may not set MIME correctly)
    var name = (file.name || '').toLowerCase();
    if (/\.(png|jpg|jpeg|gif|webp)$/.test(name)) {
      isSupported = true;
    }
  }

  if (!isSupported) {
    return { valid: false, error: '仅支持 PNG、JPG、GIF、WebP 格式' };
  }

  // Check file size
  if (file.size > MAX_IMAGE_SIZE) {
    return { valid: false, error: '文件大小超过 2MB 限制' };
  }

  return { valid: true };
}

/**
 * handleIconUpload(iconName, file)
 * Reads the image file as base64 data URL and stores in AppState.iconImages.
 * Updates the corresponding upload slot with a preview image and green border.
 *
 * @param {string} iconName - The icon name to associate the image with
 * @param {File} file - The validated image file
 * @returns {Promise<void>}
 */
function handleIconUpload(iconName, file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();

    reader.onload = function(e) {
      var base64 = e.target.result;

      // Store in AppState
      AppState.iconImages[iconName] = base64;

      // Re-render preview with updated icon images
      if (AppState.pages && AppState.pages.length > 0) {
        render(AppState.pages, AppState.iconImages);
      }

      // Update UI for the corresponding slot
      var slot = document.querySelector('.icon-slot[data-icon="' + iconName + '"]');
      if (slot) {
        // Remove error state if present
        slot.classList.remove('error');
        var errorMsg = slot.querySelector('.icon-error-msg');
        if (errorMsg) errorMsg.remove();

        // Add green border
        slot.classList.add('has-image');

        // Update or create image preview
        var img = slot.querySelector('img');
        if (!img) {
          // Remove placeholder icon
          var placeholder = slot.querySelector('.icon-placeholder');
          if (placeholder) placeholder.remove();

          img = document.createElement('img');
          var nameEl = slot.querySelector('.icon-name');
          if (nameEl) {
            slot.insertBefore(img, nameEl);
          } else {
            slot.appendChild(img);
          }
        }
        img.src = base64;
        img.alt = iconName;
      }

      resolve();
    };

    reader.onerror = function() {
      reject(new Error('文件读取失败'));
    };

    reader.readAsDataURL(file);
  });
}

/**
 * getIconImage(iconName)
 * Returns the base64 data URL for a given icon name, or null if not uploaded.
 *
 * @param {string} iconName - The icon name
 * @returns {string|null} Base64 data URL or null
 */
function getIconImage(iconName) {
  if (!iconName) return null;
  return AppState.iconImages[iconName] || null;
}

/**
 * getAllIcons()
 * Returns the complete icon images map.
 *
 * @returns {Record<string, string>} Object mapping icon names to base64 data URLs
 */
function getAllIcons() {
  return AppState.iconImages;
}

/**
 * renderUploadGrid(iconNames)
 * Creates a grid of upload slots, one per unique icon name.
 * Each slot supports drag-and-drop and click-to-upload.
 *
 * @param {string[]} iconNames - Array of unique icon names
 * @returns {HTMLElement} The grid container element
 */
function renderUploadGrid(iconNames) {
  var grid = document.createElement('div');
  grid.className = 'icon-grid';

  if (!iconNames || iconNames.length === 0) {
    var emptyMsg = document.createElement('div');
    emptyMsg.className = 'step2-empty-state';
    emptyMsg.textContent = '未检测到图标引用。';
    grid.appendChild(emptyMsg);
    return grid;
  }

  for (var i = 0; i < iconNames.length; i++) {
    var iconName = iconNames[i];
    var slot = createIconSlot(iconName);
    grid.appendChild(slot);
  }

  return grid;
}

/**
 * createIconSlot(iconName)
 * Creates a single icon upload slot element with drag-and-drop and click handlers.
 *
 * @param {string} iconName - The icon name for this slot
 * @returns {HTMLElement} The slot element
 */
function createIconSlot(iconName) {
  var slot = document.createElement('div');
  slot.className = 'icon-slot';
  slot.setAttribute('data-icon', iconName);

  // Check if an image already exists for this icon
  var existingImage = AppState.iconImages[iconName];
  if (existingImage) {
    var img = document.createElement('img');
    img.src = existingImage;
    img.alt = iconName;
    slot.appendChild(img);
    slot.classList.add('has-image');
  } else {
    var placeholder = document.createElement('div');
    placeholder.className = 'icon-placeholder';
    placeholder.textContent = '🖼️';
    slot.appendChild(placeholder);
  }

  var nameLabel = document.createElement('div');
  nameLabel.className = 'icon-name';
  nameLabel.textContent = iconName;
  slot.appendChild(nameLabel);

  // --- Click-to-upload ---
  slot.addEventListener('click', function(e) {
    e.stopPropagation();
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/png,image/jpeg,image/gif,image/webp,.png,.jpg,.jpeg,.gif,.webp';
    input.style.display = 'none';

    input.addEventListener('change', function() {
      if (input.files && input.files.length > 0) {
        processIconFile(iconName, input.files[0], slot);
      }
      input.remove();
    });

    document.body.appendChild(input);
    input.click();
  });

  // --- Drag-and-drop handlers ---
  slot.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    slot.classList.add('drag-over');
  });

  slot.addEventListener('dragenter', function(e) {
    e.preventDefault();
    e.stopPropagation();
    slot.classList.add('drag-over');
  });

  slot.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    slot.classList.remove('drag-over');
  });

  slot.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    slot.classList.remove('drag-over');

    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      processIconFile(iconName, e.dataTransfer.files[0], slot);
    }
  });

  return slot;
}

/**
 * processIconFile(iconName, file, slot)
 * Validates and processes an image file for an icon slot.
 * Shows error indication on invalid file without clearing previous image.
 *
 * @param {string} iconName - The icon name
 * @param {File} file - The file to process
 * @param {HTMLElement} slot - The slot DOM element
 */
function processIconFile(iconName, file, slot) {
  // Validate the image
  var validation = validateImage(file);

  if (!validation.valid) {
    // Show error state without clearing previous image
    slot.classList.add('error');

    // Remove existing error message if any
    var existingError = slot.querySelector('.icon-error-msg');
    if (existingError) existingError.remove();

    // Add error message
    var errorMsg = document.createElement('div');
    errorMsg.className = 'icon-error-msg';
    errorMsg.textContent = validation.error;
    slot.appendChild(errorMsg);

    // Remove error state after 3 seconds
    setTimeout(function() {
      slot.classList.remove('error');
      var msg = slot.querySelector('.icon-error-msg');
      if (msg) msg.remove();
    }, 3000);

    return;
  }

  // Valid file - handle upload
  handleIconUpload(iconName, file).catch(function(err) {
    // Show error on read failure
    slot.classList.add('error');
    var existingError = slot.querySelector('.icon-error-msg');
    if (existingError) existingError.remove();

    var errorMsg = document.createElement('div');
    errorMsg.className = 'icon-error-msg';
    errorMsg.textContent = err.message || '上传失败';
    slot.appendChild(errorMsg);

    setTimeout(function() {
      slot.classList.remove('error');
      var msg = slot.querySelector('.icon-error-msg');
      if (msg) msg.remove();
    }, 3000);
  });
}

/**
 * populateIconUploadGrid()
 * Scans current pages for icon references and renders the upload grid
 * into the iconUploadGrid container in Step 2.
 */
function populateIconUploadGrid() {
  var container = document.getElementById('iconUploadGrid');
  if (!container) return;

  // Clear existing content
  container.innerHTML = '';

  if (!AppState.pages || AppState.pages.length === 0) {
    return;
  }

  // Scan pages for icon names
  var iconNames = scanForIcons(AppState.pages);

  // Render the upload grid
  var grid = renderUploadGrid(iconNames);
  container.appendChild(grid);
}

// ============================================================
// Preview Panel Module
// ============================================================

/**
 * Module-level storage for edited payout values.
 * Keys: iconName, Values: array of {count, value} objects
 */
var editedPayouts = {};

/**
 * replaceIconBrackets(text, icons, size)
 * Replaces [ICON_NAME] with inline <img> elements at exact text positions.
 * Leaves unmatched brackets (no matching image) as plain text.
 *
 * @param {string} text - Text containing [ICON_NAME] references
 * @param {Record<string, string>} icons - Map of icon names to base64 data URLs
 * @param {number} size - Pixel size for the image (width and height)
 * @returns {string} HTML string with <img> tags replacing matched brackets
 */
function replaceIconBrackets(text, icons, size) {
  if (!text || typeof text !== 'string') return text || '';
  if (!icons || typeof icons !== 'object') return escapeHtml(text);

  var sz = size || 40;
  // Split text into segments: plain text vs [ICON_NAME] patterns
  var segments = [];
  var pattern = /\[([A-Z][A-Z0-9_]*)\]/g;
  var lastIdx = 0;
  var match;

  while ((match = pattern.exec(text)) !== null) {
    // Add plain text segment before this match
    if (match.index > lastIdx) {
      segments.push({ type: 'text', value: text.substring(lastIdx, match.index) });
    }
    // Add icon segment
    var iconName = match[1];
    if (icons[iconName]) {
      segments.push({ type: 'icon', name: iconName, src: icons[iconName] });
    } else {
      // No matching image - leave as plain text
      segments.push({ type: 'text', value: match[0] });
    }
    lastIdx = match.index + match[0].length;
  }

  // Add remaining text
  if (lastIdx < text.length) {
    segments.push({ type: 'text', value: text.substring(lastIdx) });
  }

  // Build HTML from segments
  var result = '';
  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    if (seg.type === 'icon') {
      result += '<img src="' + seg.src + '" alt="' + seg.name +
        '" class="preview-inline-icon" style="width:' + sz + 'px;height:' + sz + 'px;">';
    } else {
      result += escapeHtml(seg.value);
    }
  }

  return result;
}

/**
 * escapeHtml(str)
 * Simple HTML escape for safe text rendering.
 */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * renderJackpotLabels(text)
 * Replaces {{GRAND}}/{{MAJOR}}/{{MINOR}}/{{MINI}} with colored HTML span labels.
 *
 * @param {string} text - Text containing {{JACKPOT}} markers
 * @returns {string} HTML string with colored labels
 */
function renderJackpotLabels(text) {
  if (!text || typeof text !== 'string') return text || '';
  var result = text;
  result = result.replace(/\{\{GRAND\}\}/g, '<span class="jackpot-label jackpot-grand">GRAND</span>');
  result = result.replace(/\{\{MAJOR\}\}/g, '<span class="jackpot-label jackpot-major">MAJOR</span>');
  result = result.replace(/\{\{MINOR\}\}/g, '<span class="jackpot-label jackpot-minor">MINOR</span>');
  result = result.replace(/\{\{MINI\}\}/g, '<span class="jackpot-label jackpot-mini">MINI</span>');
  return result;
}

/**
 * processTextForPreview(text, icons, size)
 * Applies icon bracket replacement AND jackpot label rendering in a single pass.
 * Handles escaping of plain text while preserving generated HTML.
 *
 * @param {string} text - Raw text
 * @param {Record<string, string>} icons - Icon images map
 * @param {number} size - Icon size in px
 * @returns {string} Processed HTML string
 */
function processTextForPreview(text, icons, size) {
  if (!text) return '';
  var sz = size || 40;
  var safeIcons = icons || {};

  // Combined pattern: match [ICON_NAME] or {{JACKPOT}} tokens
  var combinedPattern = /\[([A-Z][A-Z0-9_]*)\]|\{\{(GRAND|MAJOR|MINOR|MINI)\}\}/g;
  var segments = [];
  var lastIdx = 0;
  var match;

  while ((match = combinedPattern.exec(text)) !== null) {
    // Plain text before this match
    if (match.index > lastIdx) {
      segments.push({ type: 'text', value: text.substring(lastIdx, match.index) });
    }

    if (match[1]) {
      // Icon bracket [ICON_NAME]
      var iconName = match[1];
      if (safeIcons[iconName]) {
        segments.push({ type: 'html', value: '<img src="' + safeIcons[iconName] + '" alt="' +
          iconName + '" class="preview-inline-icon" style="width:' + sz + 'px;height:' + sz + 'px;">' });
      } else {
        segments.push({ type: 'text', value: match[0] });
      }
    } else if (match[2]) {
      // Jackpot label {{GRAND}}, {{MAJOR}}, etc.
      var tier = match[2];
      var cls = 'jackpot-' + tier.toLowerCase();
      segments.push({ type: 'html', value: '<span class="jackpot-label ' + cls + '">' + tier + '</span>' });
    }

    lastIdx = match.index + match[0].length;
  }

  // Remaining text
  if (lastIdx < text.length) {
    segments.push({ type: 'text', value: text.substring(lastIdx) });
  }

  // Assemble: escape text segments, pass through html segments
  var result = '';
  for (var i = 0; i < segments.length; i++) {
    if (segments[i].type === 'html') {
      result += segments[i].value;
    } else {
      result += escapeHtml(segments[i].value);
    }
  }
  return result;
}

/**
 * classifyPaySymbol(name)
 * Classifies a symbol name into tier categories for PAYS grid layout.
 * Returns 'high', 'medium', or 'low'.
 */
function classifyPaySymbol(name) {
  if (!name) return 'medium';
  var upper = name.toUpperCase();
  // High-value: WILD, SCATTER, BONUS, LINK, H-series
  if (/^(WILD|SCATTER|BONUS|LINK)/.test(upper)) return 'high';
  if (/^H\d/.test(upper)) return 'high';
  // Low-value: A, K, Q, J, 10, L-series
  if (/^(A|K|Q|J|10)$/.test(upper)) return 'low';
  if (/^L\d/.test(upper)) return 'low';
  return 'medium';
}

/**
 * parsePayoutData(text)
 * Parses payout data from item text.
 * Format: "* 5 - 250 / 4 - 40 / 3 - 20"
 * Returns array of { count, value } objects.
 */
function parsePayoutData(text) {
  if (!text) return [];
  var rows = [];
  var pattern = /(\d+)\s*[-–—]\s*([^\s/／,，]+)/g;
  var match;
  while ((match = pattern.exec(text)) !== null) {
    rows.push({ count: parseInt(match[1], 10), value: match[2] });
  }
  return rows;
}

/**
 * extractIconNameFromPayItem(item)
 * Extracts the icon name from a PAYS page item.
 * Looks for [ICON_NAME] bracket notation or H/L patterns.
 */
function extractIconNameFromPayItem(item) {
  if (!item) return null;
  var text = (item.cn || '') + ' ' + (item.en || '');
  // Try bracket notation first
  var bracketMatch = text.match(/\[([A-Z][A-Z0-9_]*)\]/);
  if (bracketMatch) return bracketMatch[1];
  // Try H/L pattern
  var hlMatch = text.match(/\b([HL]\d+)\b/i);
  if (hlMatch) return hlMatch[1].toUpperCase();
  // Try special icon keywords at start
  var specialMatch = text.match(/^\*?\s*(WILD|SCATTER|BONUS|LINK)\d*/i);
  if (specialMatch) return specialMatch[1].toUpperCase();
  return null;
}

/**
 * renderFeaturePage(page, icons)
 * Returns an HTML string for a FEATURE page with grouped special icon blocks.
 * Each block: icon image(s) + ALL CAPS label below + description text to the right.
 *
 * @param {PaytablePage} page - The FEATURE page object
 * @param {Record<string, string>} icons - Icon images map
 * @returns {string} HTML string
 */
function renderFeaturePage(page, icons) {
  if (!page || !page.items) return '';
  var html = '';
  // Group items by icon reference
  var currentIcon = null;
  var currentDescLines = [];

  function flushBlock() {
    if (!currentIcon && currentDescLines.length === 0) return;
    html += '<div class="preview-feature-block">';
    html += '<div class="preview-feature-icon-group">';
    if (currentIcon && icons && icons[currentIcon]) {
      html += '<img src="' + icons[currentIcon] + '" alt="' + currentIcon + '">';
    } else if (currentIcon) {
      html += '<div style="width:50px;height:50px;display:flex;align-items:center;justify-content:center;' +
        'background:rgba(255,255,255,.05);border-radius:4px;font-size:.65rem;color:#8892b0;">' +
        escapeHtml(currentIcon) + '</div>';
    }
    if (currentIcon) {
      html += '<div class="icon-label">' + escapeHtml(currentIcon) + '</div>';
    }
    html += '</div>';
    html += '<div class="preview-feature-desc">';
    for (var d = 0; d < currentDescLines.length; d++) {
      html += '<div>' + currentDescLines[d] + '</div>';
    }
    html += '</div></div>';
  }

  for (var i = 0; i < page.items.length; i++) {
    var item = page.items[i];
    var text = item.cn || item.en || '';
    // Check if this item introduces a new icon (ALL CAPS label pattern)
    var labelMatch = text.match(/^\*?\s*([A-Z][A-Z0-9_]*)\s*$/);
    if (labelMatch) {
      // Flush previous block
      flushBlock();
      currentIcon = labelMatch[1];
      currentDescLines = [];
      continue;
    }
    // Check if item has a bracket icon that could start a new block
    var iconRef = text.match(/\[([A-Z][A-Z0-9_]*)\]/);
    if (iconRef && currentIcon === null && i === 0) {
      currentIcon = iconRef[1];
    }
    // Add processed description
    var processedCn = processTextForPreview(item.cn || '', icons, 40);
    var processedEn = processTextForPreview(item.en || '', icons, 40);
    currentDescLines.push(
      '<div style="display:flex;gap:12px;align-items:flex-start;">' +
      '<div style="flex:1;min-width:0;">' + processedCn + '</div>' +
      '<div style="flex:1;min-width:0;color:#8892b0;font-size:.8rem;">' + processedEn + '</div>' +
      '</div>'
    );
  }
  // Flush last block
  flushBlock();

  return html;
}

/**
 * renderPaysPage(page, icons)
 * Renders the PAYS page with tiered grid layout.
 * High-value (WILD, SCATTER, BONUS, LINK, H-series): 2 per row
 * Medium (general): 3 per row
 * Low-value (A/K/Q/J/10, L-series): 5 per row
 *
 * @param {PaytablePage} page - The PAYS page object
 * @param {Record<string, string>} icons - Icon images map
 * @returns {string} HTML string
 */
function renderPaysPage(page, icons) {
  if (!page || !page.items) return '';

  // Parse each item into symbol data
  var symbols = [];
  for (var i = 0; i < page.items.length; i++) {
    var item = page.items[i];
    var iconName = extractIconNameFromPayItem(item);
    if (!iconName) continue;

    var payouts = [];
    // Check if we have edited payouts stored
    if (editedPayouts[iconName] && editedPayouts[iconName].length > 0) {
      payouts = editedPayouts[iconName];
    } else {
      // Parse from item text
      payouts = parsePayoutData(item.cn || item.en || '');
      if (payouts.length === 0) {
        // Default to 3 rows
        payouts = [
          { count: 5, value: '数值待定' },
          { count: 4, value: '数值待定' },
          { count: 3, value: '数值待定' }
        ];
      }
      // Store initial parsed payouts
      editedPayouts[iconName] = payouts.slice();
    }

    symbols.push({
      name: iconName,
      tier: classifyPaySymbol(iconName),
      payouts: payouts
    });
  }

  // Group by tier
  var highSymbols = symbols.filter(function(s) { return s.tier === 'high'; });
  var medSymbols = symbols.filter(function(s) { return s.tier === 'medium'; });
  var lowSymbols = symbols.filter(function(s) { return s.tier === 'low'; });

  var html = '';

  // Render each tier group
  function renderTierGroup(syms, perRow) {
    if (syms.length === 0) return '';
    var groupHtml = '<div class="preview-pays-grid" style="' +
      'display:grid;grid-template-columns:repeat(' + perRow + ',1fr);gap:12px;margin-bottom:16px;">';
    for (var s = 0; s < syms.length; s++) {
      var sym = syms[s];
      groupHtml += renderPayItem(sym, icons);
    }
    groupHtml += '</div>';
    return groupHtml;
  }

  html += renderTierGroup(highSymbols, 2);
  html += renderTierGroup(medSymbols, 3);
  html += renderTierGroup(lowSymbols, 5);

  return html;
}

/**
 * renderPayItem(sym, icons)
 * Renders a single pay symbol card with icon and editable payout rows.
 */
function renderPayItem(sym, icons) {
  var html = '<div class="preview-pays-item" data-symbol="' + sym.name + '">';

  // Icon image or placeholder
  if (icons && icons[sym.name]) {
    html += '<img src="' + icons[sym.name] + '" alt="' + sym.name +
      '" class="preview-pays-icon">';
  } else {
    html += '<div class="preview-pays-icon-placeholder">' + escapeHtml(sym.name) + '</div>';
  }

  // Symbol name label
  html += '<div style="font-size:.72rem;color:#ffd200;font-weight:700;margin-bottom:6px;">' +
    escapeHtml(sym.name) + '</div>';

  // Payout rows container
  html += '<div class="preview-payout-rows" data-icon="' + sym.name + '">';
  for (var p = 0; p < sym.payouts.length; p++) {
    html += '<div class="preview-payout-row">';
    html += '<input type="text" value="' + sym.payouts[p].count + ' - ' +
      escapeHtml(String(sym.payouts[p].value)) + '" ' +
      'data-icon="' + sym.name + '" data-idx="' + p + '" ' +
      'onchange="onPayoutEdit(this)">';
    html += '</div>';
  }
  html += '</div>';

  // Add/Remove row buttons
  html += '<div class="preview-pays-row-buttons">';
  html += '<button class="preview-payout-add" onclick="addPayoutRow(\'' +
    sym.name + '\')" title="添加行">+</button>';
  html += '<button class="preview-payout-remove" onclick="removePayoutRow(\'' +
    sym.name + '\')" title="删除行">−</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

/**
 * onPayoutEdit(inputEl)
 * Called when a payout input value is changed. Updates editedPayouts.
 */
function onPayoutEdit(inputEl) {
  var iconName = inputEl.getAttribute('data-icon');
  var idx = parseInt(inputEl.getAttribute('data-idx'), 10);
  var val = inputEl.value.trim();

  // Parse "count - value" format
  var match = val.match(/^(\d+)\s*[-–—]\s*(.+)$/);
  if (match) {
    if (!editedPayouts[iconName]) editedPayouts[iconName] = [];
    editedPayouts[iconName][idx] = { count: parseInt(match[1], 10), value: match[2].trim() };
  }
}

/**
 * addPayoutRow(iconName)
 * Adds a new payout row to a symbol.
 */
function addPayoutRow(iconName) {
  if (!editedPayouts[iconName]) editedPayouts[iconName] = [];
  var payouts = editedPayouts[iconName];
  // Determine next count (one less than smallest, or 2)
  var minCount = 2;
  if (payouts.length > 0) {
    minCount = payouts[payouts.length - 1].count - 1;
    if (minCount < 2) minCount = 2;
  }
  payouts.push({ count: minCount, value: '数值待定' });
  editedPayouts[iconName] = payouts;

  // Re-render the payout rows for this symbol
  refreshPayoutRows(iconName);
}

/**
 * removePayoutRow(iconName)
 * Removes the last payout row from a symbol.
 */
function removePayoutRow(iconName) {
  if (!editedPayouts[iconName] || editedPayouts[iconName].length <= 1) return;
  editedPayouts[iconName].pop();
  refreshPayoutRows(iconName);
}

/**
 * refreshPayoutRows(iconName)
 * Re-renders payout row inputs for a specific symbol.
 */
function refreshPayoutRows(iconName) {
  var container = document.querySelector('.preview-payout-rows[data-icon="' + iconName + '"]');
  if (!container) return;
  var payouts = editedPayouts[iconName] || [];
  var html = '';
  for (var p = 0; p < payouts.length; p++) {
    html += '<div class="preview-payout-row">';
    html += '<input type="text" value="' + payouts[p].count + ' - ' +
      escapeHtml(String(payouts[p].value)) + '" ' +
      'data-icon="' + iconName + '" data-idx="' + p + '" ' +
      'onchange="onPayoutEdit(this)">';
    html += '</div>';
  }
  container.innerHTML = html;
}

/**
 * render(pages, iconImages)
 * Main preview render function. Displays all pages in a scrollable format
 * inside #previewPanel container. Renders each page with "第N页 / Page N" header
 * and bilingual title. Hides the empty state message.
 *
 * @param {PaytablePage[]} pages - Array of page objects
 * @param {Record<string, string>} iconImages - Icon images map
 */
function render(pages, iconImages) {
  var panel = document.getElementById('previewPanel');
  var emptyState = document.getElementById('previewEmptyState');
  if (!panel) return;

  var icons = iconImages || {};

  // Hide empty state
  if (emptyState) emptyState.style.display = 'none';

  if (!pages || pages.length === 0) {
    if (emptyState) emptyState.style.display = 'block';
    panel.innerHTML = '';
    panel.appendChild(emptyState);
    return;
  }

  var html = '';

  for (var i = 0; i < pages.length; i++) {
    var page = pages[i];
    var pageNum = i + 1;
    var title = page.title || '';
    var titleEn = page.titleEn || '';

    html += '<div class="preview-page" data-page-idx="' + i + '">';

    // Page header
    html += '<div class="preview-page-header">第' + pageNum + '页 / Page ' + pageNum + '</div>';

    // Bilingual title
    html += '<div class="preview-page-title">' + escapeHtml(title) +
      (titleEn ? '  |  ' + escapeHtml(titleEn) : '') + '</div>';

    // Content area
    html += '<div class="preview-content">';

    // Determine page type for specialized rendering
    var titleUpper = (title + ' ' + titleEn).toUpperCase();
    var isFeaturePage = (i === 0) || /^FEATURE\b/.test(titleUpper) ||
      /^特色/.test(title) || /^功能/.test(title);
    var isPaysPage = /^PAYS\b/.test(titleUpper) || /^赔付/.test(title) || /^符号/.test(title);

    if (isFeaturePage && i === 0) {
      html += renderFeaturePage(page, icons);
    } else if (isPaysPage) {
      html += renderPaysPage(page, icons);
    } else {
      // Feature detail page or other page
      html += renderDetailPage(page, icons);
    }

    html += '</div>'; // .preview-content

    // Editable text areas
    html += renderEditableAreas(page, i);

    html += '</div>'; // .preview-page
  }

  // Set innerHTML (preserving empty state element)
  panel.innerHTML = html;
  if (emptyState) {
    emptyState.style.display = 'none';
  }
}

/**
 * renderDetailPage(page, icons)
 * Renders a feature detail page or generic page with inline icons and tables.
 */
function renderDetailPage(page, icons) {
  if (!page || !page.items) return '';
  var html = '';

  for (var i = 0; i < page.items.length; i++) {
    var item = page.items[i];

    // Render table data if present
    if (item.table && item.table.headers && item.table.rows) {
      html += '<table class="preview-table">';
      html += '<thead><tr>';
      for (var h = 0; h < item.table.headers.length; h++) {
        html += '<th>' + escapeHtml(item.table.headers[h]) + '</th>';
      }
      html += '</tr></thead><tbody>';
      for (var r = 0; r < item.table.rows.length; r++) {
        html += '<tr>';
        for (var c = 0; c < item.table.rows[r].length; c++) {
          var cellText = item.table.rows[r][c] || '';
          html += '<td>' + processTextForPreview(cellText, icons, 30) + '</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
    }

    // Render text content
    if (item.cn || item.en) {
      var cnProcessed = processTextForPreview(item.cn || '', icons, 40);
      var enProcessed = processTextForPreview(item.en || '', icons, 40);
      html += '<div style="display:flex;gap:16px;margin-bottom:4px;align-items:flex-start;">';
      html += '<div style="flex:1;min-width:0;">' + cnProcessed + '</div>';
      html += '<div style="flex:1;min-width:0;color:#8892b0;font-size:.82rem;">' + enProcessed + '</div>';
      html += '</div>';
    }
  }

  return html;
}

/**
 * renderEditableAreas(page, pageIdx)
 * Renders editable textarea elements for Chinese and English content.
 */
function renderEditableAreas(page, pageIdx) {
  if (!page || !page.items) return '';

  // Build text content from items
  var cnLines = [];
  var enLines = [];
  for (var i = 0; i < page.items.length; i++) {
    if (page.items[i].cn) cnLines.push(page.items[i].cn);
    if (page.items[i].en) enLines.push(page.items[i].en);
  }

  var html = '';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;">';
  html += '<div>';
  html += '<div style="font-size:.72rem;color:#8892b0;margin-bottom:4px;">中文内容 (可编辑)</div>';
  html += '<textarea class="preview-editable" data-page="' + pageIdx +
    '" data-lang="cn" onchange="onContentEdit(this)">' + escapeHtml(cnLines.join('\n')) + '</textarea>';
  html += '</div>';
  html += '<div>';
  html += '<div style="font-size:.72rem;color:#8892b0;margin-bottom:4px;">English Content (editable)</div>';
  html += '<textarea class="preview-editable" data-page="' + pageIdx +
    '" data-lang="en" onchange="onContentEdit(this)">' + escapeHtml(enLines.join('\n')) + '</textarea>';
  html += '</div>';
  html += '</div>';

  return html;
}


/**
 * Module-level storage for edited content (textarea edits).
 * Keys: "pageIdx-lang" (e.g., "0-cn", "1-en"), Values: edited text string
 */
var editedContent = {};

/**
 * onContentEdit(textareaEl)
 * Called when a textarea value is changed. Stores the edit.
 */
function onContentEdit(textareaEl) {
  var pageIdx = textareaEl.getAttribute('data-page');
  var lang = textareaEl.getAttribute('data-lang');
  var key = pageIdx + '-' + lang;
  editedContent[key] = textareaEl.value;
}

/**
 * getEditedContent()
 * Returns the pages array with all user modifications reflected.
 * Combines textarea edits + payout edits from the PAYS page.
 *
 * @returns {PaytablePage[]} Modified pages array
 */
function getEditedContent() {
  if (!AppState.pages || AppState.pages.length === 0) return [];

  // Deep copy pages
  var pages = JSON.parse(JSON.stringify(AppState.pages));

  // Apply textarea edits
  for (var key in editedContent) {
    if (!editedContent.hasOwnProperty(key)) continue;
    var parts = key.split('-');
    var pageIdx = parseInt(parts[0], 10);
    var lang = parts[1];
    if (isNaN(pageIdx) || pageIdx < 0 || pageIdx >= pages.length) continue;

    var editedText = editedContent[key];
    var lines = editedText.split('\n').filter(function(l) {
      return l.trim() !== '';
    });

    // Rebuild items from edited lines
    var page = pages[pageIdx];
    while (page.items.length < lines.length) {
      page.items.push({ cn: '', en: '' });
    }

    for (var i = 0; i < lines.length; i++) {
      if (i < page.items.length) {
        page.items[i][lang] = lines[i];
      }
    }
    // Trim excess items if edited text has fewer lines
    if (lines.length < page.items.length) {
      var otherLang = (lang === 'cn') ? 'en' : 'cn';
      var otherKey = pageIdx + '-' + otherLang;
      if (editedContent[otherKey]) {
        var otherLines = editedContent[otherKey].split('\n').filter(function(l) {
          return l.trim() !== '';
        });
        var maxLen = Math.max(lines.length, otherLines.length);
        page.items = page.items.slice(0, maxLen);
      }
    }
  }

  // Apply payout edits to PAYS page
  for (var p = 0; p < pages.length; p++) {
    var title = (pages[p].title || '').toUpperCase();
    var titleEn = (pages[p].titleEn || '').toUpperCase();
    var combined = title + ' ' + titleEn;
    var isPays = /^PAYS\b/.test(combined) ||
      /^赔付/.test(pages[p].title || '') ||
      /^符号/.test(pages[p].title || '');

    if (isPays) {
      var newItems = [];
      for (var iconName in editedPayouts) {
        if (!editedPayouts.hasOwnProperty(iconName)) continue;
        var payouts = editedPayouts[iconName];
        if (!payouts || payouts.length === 0) continue;

        var payStr = payouts.map(function(row) {
          return row.count + ' - ' + row.value;
        }).join(' / ');

        newItems.push({
          cn: '* [' + iconName + '] ' + payStr,
          en: '* [' + iconName + '] ' + payStr
        });
      }
      if (newItems.length > 0) {
        pages[p].items = newItems;
      }
      break;
    }
  }

  return pages;
}

/**
 * PreviewPanel namespace object for external access.
 */
var PreviewPanel = {
  render: render,
  renderFeaturePage: renderFeaturePage,
  renderPaysPage: renderPaysPage,
  replaceIconBrackets: replaceIconBrackets,
  renderJackpotLabels: renderJackpotLabels,
  getEditedContent: getEditedContent,
  processTextForPreview: processTextForPreview
};

// ============================================================
// Excel Exporter Module
// ============================================================

/**
 * buildWorkbook(pages, metadata, icons)
 * Creates an ExcelJS workbook with "paytable_市场" worksheet,
 * sets up column layout, writes title row, and exports all page content.
 *
 * @param {Array} pages - Array of PaytablePage objects with title, titleEn, items
 * @param {Object} metadata - { brand, gameName }
 * @param {Object} icons - Record<string, string> iconName -> base64 data URL
 * @returns {Promise<ExcelJS.Workbook>} The constructed workbook
 */
async function buildWorkbook(pages, metadata, icons) {
  var workbook = new ExcelJS.Workbook();
  var worksheet = workbook.addWorksheet('paytable_市场');

  // Set column widths: A(4), B(50), C(4), D(50)
  worksheet.columns = [
    { width: 4 },
    { width: 50 },
    { width: 4 },
    { width: 50 }
  ];

  // Default font for the worksheet
  var defaultFont = { name: 'Microsoft YaHei', size: 11 };
  var titleFont = { name: 'Microsoft YaHei', size: 14, bold: true };

  // Row 1: Title row
  var titleRow = worksheet.addRow([
    '',
    metadata.brand + metadata.gameName + '：paytable需求',
    '',
    'Paytable Requirement (Chinese-English)'
  ]);
  titleRow.getCell(2).font = titleFont;
  titleRow.getCell(4).font = titleFont;

  // Export each page
  for (var p = 0; p < pages.length; p++) {
    var page = pages[p];

    // Page separator row (gray background)
    var separatorRow = worksheet.addRow(['', '', '', '']);
    for (var sc = 1; sc <= 4; sc++) {
      separatorRow.getCell(sc).fill = {
        type: 'pattern',
        pattern: 'solid',
        fgColor: { argb: 'FFC0C0C0' }
      };
      separatorRow.getCell(sc).font = defaultFont;
    }

    // Centered bilingual title row
    var pageTitleRow = worksheet.addRow([
      '',
      page.title || '',
      '',
      page.titleEn || ''
    ]);
    pageTitleRow.getCell(2).font = titleFont;
    pageTitleRow.getCell(2).alignment = { horizontal: 'center' };
    pageTitleRow.getCell(4).font = titleFont;
    pageTitleRow.getCell(4).alignment = { horizontal: 'center' };

    // Determine page type
    var titleUpper = ((page.title || '') + ' ' + (page.titleEn || '')).toUpperCase();
    var isPays = /^PAYS\b/.test(titleUpper) ||
      /^赔付/.test(page.title || '') ||
      /^符号/.test(page.title || '');
    var isFeature = /^FEATURE\b/.test(titleUpper) ||
      /^特殊图标/.test(page.title || '');

    if (isPays) {
      // PAYS page: export with icon images in col A
      await exportPaysPage(worksheet, page, icons, defaultFont);
    } else {
      // FEATURE and feature detail pages: export with inline icon support
      await exportContentPage(worksheet, page, icons, defaultFont, isFeature);
    }
  }

  return workbook;
}

/**
 * exportPaysPage(worksheet, page, icons, font)
 * Exports the PAYS page content. Each symbol gets its icon in col A (40x40)
 * followed by payout rows on consecutive lines.
 */
async function exportPaysPage(worksheet, page, icons, font) {
  var items = page.items || [];
  var currentIcon = null;
  var iconPlaced = {};

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var cnText = item.cn || '';
    var enText = item.en || '';

    // Detect icon name from bracket notation at start of line
    var iconMatch = cnText.match(/^\*?\s*\[([A-Za-z0-9_]+)\]/);
    var iconName = iconMatch ? iconMatch[1] : null;

    var row = worksheet.addRow(['', cnText, '', enText]);
    row.getCell(2).font = font;
    row.getCell(4).font = font;

    // Embed icon image on first reference row for this icon
    if (iconName && !iconPlaced[iconName] && icons && icons[iconName]) {
      await embedIconImage(worksheet, row.number, 1, icons[iconName], { width: 40, height: 40 });
      row.height = 30;
      iconPlaced[iconName] = true;
    }
  }
}

/**
 * exportContentPage(worksheet, page, icons, font, isFeaturePage)
 * Exports FEATURE or feature detail page content rows.
 * Embeds icons in the adjacent image placeholder column on first reference.
 */
async function exportContentPage(worksheet, page, icons, font, isFeaturePage) {
  var items = page.items || [];
  var iconPlaced = {};

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var cnText = item.cn || '';
    var enText = item.en || '';

    var row = worksheet.addRow(['', cnText, '', enText]);
    row.getCell(2).font = font;
    row.getCell(4).font = font;

    // Find icon references in the text
    var iconRefs = cnText.match(/\[([A-Za-z0-9_]+)\]/g);
    if (iconRefs) {
      for (var r = 0; r < iconRefs.length; r++) {
        var refName = iconRefs[r].replace(/[\[\]]/g, '');
        if (!iconPlaced[refName] && icons && icons[refName]) {
          // Embed in col A (Chinese side image placeholder) on first reference
          await embedIconImage(worksheet, row.number, 1, icons[refName], { width: 40, height: 40 });
          row.height = 30;
          iconPlaced[refName] = true;
          break; // Only embed one icon per row in col A
        }
      }
    }

    // Also check English text for icon references to embed in col C
    var enIconRefs = enText.match(/\[([A-Za-z0-9_]+)\]/g);
    if (enIconRefs) {
      for (var er = 0; er < enIconRefs.length; er++) {
        var enRefName = enIconRefs[er].replace(/[\[\]]/g, '');
        if (!iconPlaced['en_' + enRefName] && icons && icons[enRefName]) {
          await embedIconImage(worksheet, row.number, 3, icons[enRefName], { width: 40, height: 40 });
          row.height = 30;
          iconPlaced['en_' + enRefName] = true;
          break; // Only embed one icon per row in col C
        }
      }
    }
  }
}

/**
 * embedIconImage(worksheet, rowNum, col, base64DataUrl, size)
 * Embeds an icon image into the specified cell position in the worksheet.
 *
 * @param {ExcelJS.Worksheet} worksheet - Target worksheet
 * @param {number} rowNum - 1-based row number
 * @param {number} col - 1-based column number (1=A, 3=C)
 * @param {string} base64DataUrl - Base64 data URL (data:image/png;base64,...)
 * @param {Object} size - { width, height } in pixels
 */
async function embedIconImage(worksheet, rowNum, col, base64DataUrl, size) {
  if (!base64DataUrl) return;

  // Extract raw base64 data from data URL
  var base64Data = base64DataUrl;
  var extension = 'png';
  if (base64DataUrl.indexOf('data:') === 0) {
    var parts = base64DataUrl.split(',');
    base64Data = parts[1];
    // Detect extension from MIME type
    var mimeMatch = parts[0].match(/data:image\/([a-z]+)/);
    if (mimeMatch) {
      extension = mimeMatch[1];
      if (extension === 'jpeg') extension = 'jpeg';
    }
  }

  // Add image to workbook
  var imageId = worksheet.workbook.addImage({
    base64: base64Data,
    extension: extension
  });

  // Calculate cell anchor position (0-based col index)
  var colIndex = col - 1;

  worksheet.addImage(imageId, {
    tl: { col: colIndex, row: rowNum - 1 },
    ext: { width: size.width, height: size.height }
  });
}

/**
 * triggerDownload(workbook, filename)
 * Generates the Excel buffer and triggers a browser download via FileSaver.
 *
 * @param {ExcelJS.Workbook} workbook - The constructed ExcelJS workbook
 * @param {string} filename - Filename for the download
 */
async function triggerDownload(workbook, filename) {
  var buffer = await workbook.xlsx.writeBuffer();
  var blob = new Blob([buffer], {
    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  });
  saveAs(blob, filename);
}

/**
 * generateExportFilename(brand, gameName)
 * Returns the formatted export filename.
 *
 * @param {string} brand - Brand identifier (CTS, JFS, JMS)
 * @param {string} gameName - Game name string
 * @returns {string} Formatted filename
 */
function generateExportFilename(brand, gameName) {
  return brand + gameName + '：paytable需求文档.xlsx';
}

/**
 * exportToExcel()
 * Full export flow: validates content exists, builds workbook, triggers download.
 */
async function exportToExcel() {
  // Validation: check if content has been generated
  if (!AppState.pages || AppState.pages.length === 0) {
    alert('请先生成paytable内容后再导出。\nPlease generate paytable content first before exporting.');
    return;
  }

  // Get pages with user edits applied
  var pages = getEditedContent();
  var metadata = {
    brand: AppState.brand || 'CTS',
    gameName: AppState.gameName || ''
  };
  var icons = AppState.iconImages || {};

  try {
    // Build workbook
    var workbook = await buildWorkbook(pages, metadata, icons);

    // Generate filename and trigger download
    var filename = generateExportFilename(metadata.brand, metadata.gameName);
    await triggerDownload(workbook, filename);
  } catch (err) {
    console.error('Excel export error:', err);
    alert('导出Excel失败：' + (err.message || err) + '\nExcel export failed.');
  }
}

/**
 * ExcelExporter namespace object for external access.
 */
var ExcelExporter = {
  buildWorkbook: buildWorkbook,
  embedIconImage: embedIconImage,
  triggerDownload: triggerDownload,
  generateExportFilename: generateExportFilename,
  exportToExcel: exportToExcel
};

// Wire export button click event
document.addEventListener('DOMContentLoaded', function() {
  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) {
    exportBtn.addEventListener('click', function() {
