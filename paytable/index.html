<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老虎机Paytable需求文档生成器</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;padding:28px 14px;color:#e0e0e0}
.container{max-width:1100px;margin:0 auto}
h1{text-align:center;font-size:1.8rem;margin-bottom:8px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:#8892b0;margin-bottom:24px;font-size:0.9rem}
.step-nav{display:flex;justify-content:center;gap:4px;margin-bottom:22px;flex-wrap:wrap}
.step-btn{padding:10px 18px;border:none;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,.05);color:#8892b0;border:1px solid rgba(255,255,255,.1);transition:all .3s;font-family:inherit}
.step-btn:hover{color:#ccd6f6;border-color:rgba(247,151,30,.3)}
.step-btn.active{background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a2e;border-color:transparent}
.step-panel{display:none}.step-panel.active{display:block}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;margin-bottom:18px;backdrop-filter:blur(10px)}
.card-title{font-size:1rem;font-weight:600;color:#ccd6f6;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.form-group{margin-bottom:16px}
.form-row{display:flex;gap:12px}.form-row .form-group{flex:1}
label{display:block;font-size:.84rem;font-weight:600;margin-bottom:5px;color:#ccd6f6}
input[type="text"],input[type="number"],textarea,select{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#e0e0e0;font-size:.88rem;font-family:inherit;transition:border-color .3s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#f7971e;box-shadow:0 0 0 2px rgba(247,151,30,.12)}
textarea{min-height:80px;resize:vertical;line-height:1.5}
select{cursor:pointer;appearance:none;padding-right:28px}
select option{background:#1a1a2e;color:#e0e0e0}
.info-tip{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:rgba(79,172,254,.06);border:1px solid rgba(79,172,254,.15);border-radius:7px;margin-bottom:14px;font-size:.8rem;color:#8892b0;line-height:1.5}
.info-tip::before{content:'💡';flex-shrink:0}
.btn-primary{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none;margin:0 auto}
.btn-primary.loading .spinner{display:inline-block}.btn-primary.loading .btn-text{display:none}
.btn-export{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#f7971e,#ffd200);border:none;border-radius:10px;color:#1a1a2e;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .2s;margin-top:12px}
.btn-export:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(247,151,30,.3)}
.btn-export:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-add{padding:6px 12px;background:rgba(247,151,30,.1);border:1px solid rgba(247,151,30,.25);border-radius:6px;color:#ffd200;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-add:hover{background:rgba(247,151,30,.2)}
.btn-danger{padding:4px 8px;background:rgba(245,87,108,.08);border:1px solid rgba(245,87,108,.2);border-radius:4px;color:#ff6b6b;font-size:.72rem;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:rgba(245,87,108,.15)}
.ai-status{font-size:.78rem;color:#8892b0;margin-top:8px;min-height:1.2em}
.ai-status.generating{color:#a78bfa}.ai-status.error{color:#ff6b6b}.ai-status.done{color:#27ae60}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<style>
.success-toast{position:fixed;top:18px;right:18px;padding:14px 20px;background:rgba(39,174,96,.95);color:#fff;border-radius:8px;font-weight:600;transform:translateX(120%);transition:transform .4s ease;z-index:1000;font-size:.88rem}
.success-toast.show{transform:translateX(0)}
.upload-area{border:2px dashed rgba(255,255,255,.15);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.upload-area:hover,.upload-area.dragover{border-color:#f7971e;background:rgba(247,151,30,.05)}
.upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-area .icon{font-size:2.5rem;margin-bottom:10px}
.upload-area .text{font-size:.9rem;color:#ccd6f6;margin-bottom:4px}
.upload-area .hint{font-size:.78rem;color:#8892b0}
.file-info{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:8px;margin-top:12px;font-size:.85rem;color:#27ae60}
.parsed-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:12px}
.summary-item{padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px}
.summary-item .lbl{font-size:.72rem;color:#8892b0;margin-bottom:3px}
.summary-item .val{font-size:.9rem;font-weight:600;color:#ffd200}
.page-section{margin-bottom:14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.page-header{padding:10px 14px;background:rgba(247,151,30,.08);font-weight:600;color:#ffd200;font-size:.84rem;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.page-content{padding:14px}
.feature-block{background:rgba(255,255,255,.02);border-left:3px solid rgba(247,151,30,.4);padding:10px 14px;margin-bottom:10px;border-radius:0 6px 6px 0}
.feature-block .ft-title{font-weight:600;color:#ccd6f6;font-size:.84rem;margin-bottom:4px}
.editable-area{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 10px;min-height:30px;outline:none;font-size:.82rem;line-height:1.5;color:#e0e0e0;transition:all .2s;width:100%;font-family:inherit}
.editable-area:focus{border-color:#f7971e;background:rgba(255,255,255,.06)}
.preview-wrap{max-height:650px;overflow:auto;border:1px solid rgba(255,255,255,.08);border-radius:8px}
.preview-table{width:100%;border-collapse:collapse;font-size:.8rem}
.preview-table th{padding:8px 10px;background:rgba(247,151,30,.1);border:1px solid rgba(255,255,255,.08);color:#ffd200;font-weight:600;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:2}
.preview-table td{padding:6px 10px;border:1px solid rgba(255,255,255,.06);vertical-align:top}
.preview-table tr:hover{background:rgba(255,255,255,.02)}
@media(max-width:768px){body{padding:16px 8px}.form-row{flex-direction:column;gap:0}.step-nav{gap:2px}.step-btn{padding:8px 10px;font-size:.76rem}.parsed-summary{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<h1>🎰 老虎机Paytable需求文档生成器</h1>
<p class="subtitle">导入玩法文档 · AI智能解析 · 中英对照 · 一键导出</p>
<div class="step-nav">
<button class="step-btn active" onclick="goStep(1)">① 导入文档</button>
<button class="step-btn" onclick="goStep(2)">② 预览导出</button>
</div>

<div class="step-panel active" id="step1">
<div class="card">
<div class="card-title">📂 导入玩法文档</div>
<div class="info-tip">上传玩法文档(.xlsx)，系统将自动解析关卡名称、图标信息、玩法规则等内容，并通过AI生成中英对照的Paytable文档。</div>
<div class="upload-area" id="uploadArea">
<div class="icon">📄</div>
<div class="text">点击或拖拽上传玩法文档</div>
<div class="hint">支持 .xlsx / .xls 格式</div>
<input type="file" accept=".xlsx,.xls" onchange="handleFileUpload(this)">
</div>
<div id="fileInfoArea"></div>
<div id="parsedArea"></div>
</div>
<div class="card">
<div class="card-title">⚙️ 基本设置</div>
<div class="form-row">
<div class="form-group"><label>品牌</label><select id="f_brand"><option>CTS</option><option>JMS</option><option>JFS</option></select></div>
<div class="form-group"><label>关卡名称</label><input type="text" id="f_name" placeholder="从文档自动提取"></div>
</div>
<div class="form-row">
<div class="form-group"><label>棋盘布局</label><input type="text" id="f_board" placeholder="如: 3X5、5X3"></div>
<div class="form-group"><label>线数/Ways</label><input type="text" id="f_lines" placeholder="如: 25线、243ways"></div>
</div>
</div>
<button class="btn-primary" id="parseBtn" onclick="aiParseAndGenerate()">
<span class="btn-text">🤖 AI 解析并生成Paytable</span><span class="spinner"></span>
</button>
<div class="ai-status" id="aiStatus"></div>
</div>

<div class="step-panel" id="step2">
<div class="card">
<div class="card-title">👁️ 文档预览</div>
<div class="preview-wrap" id="previewWrap"></div>
</div>
<button class="btn-export" onclick="exportExcel()">📥 一键导出Paytable文档 (.xlsx)</button>
</div>
</div>
<div class="success-toast" id="toast"></div>

<script>
'use strict';
var paytableData={brand:'CTS',name:'',board:'',lines:'',pages:[]};
var parsedRaw=null;

function goStep(n){
    document.querySelectorAll('.step-btn').forEach(function(b,i){b.classList.toggle('active',i===n-1)});
    document.querySelectorAll('.step-panel').forEach(function(p,i){p.classList.toggle('active',i===n-1)});
    if(n===2)renderPreview();
}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

var aiReady=false,puterLoading=false;
function loadPuterJS(){
    return new Promise(function(resolve,reject){
        if(aiReady){resolve();return}
        if(puterLoading){var w=setInterval(function(){if(aiReady){clearInterval(w);resolve()}},300);setTimeout(function(){clearInterval(w);reject(new Error('加载超时'))},30000);return}
        puterLoading=true;
        var s=document.createElement('script');s.src='https://js.puter.com/v2/';
        s.onload=function(){var e=0;var t=setInterval(function(){e+=500;if(typeof puter!=='undefined'&&puter.ai){aiReady=true;clearInterval(t);resolve()}if(e>=30000){clearInterval(t);puterLoading=false;reject(new Error('Puter.js初始化超时'))}},500)};
        s.onerror=function(){puterLoading=false;reject(new Error('Puter.js加载失败'))};
        document.head.appendChild(s);
    });
}
async function callAI(prompt){
    await loadPuterJS();
    var r=await puter.ai.chat(prompt,{model:'gpt-4o-mini',temperature:0.7});
    if(typeof r==='string')return r;
    if(r&&r.message&&r.message.content){var c=r.message.content;if(Array.isArray(c))return c.map(function(x){return x.text||x}).join('');return c}
    if(r&&r.text)return r.text;
    return String(r);
}

async function handleFileUpload(input){
    var file=input.files[0];if(!file)return;
    document.getElementById('fileInfoArea').innerHTML='<div class="file-info">📎 已选择: '+file.name+' ('+Math.round(file.size/1024)+'KB)</div>';
    try{
        var wb=new ExcelJS.Workbook();
        var buf=await file.arrayBuffer();
        await wb.xlsx.load(buf);
        parsedRaw=parseWorkbook(wb);
        showParsedSummary();
        var match=file.name.match(/(?:CTS|JFS|JMS)\s*(.+?)[:：]/);
        if(match)document.getElementById('f_name').value=match[1].trim();
        var brandMatch=file.name.match(/(CTS|JFS|JMS)/);
        if(brandMatch)document.getElementById('f_brand').value=brandMatch[1];
    }catch(e){
        document.getElementById('fileInfoArea').innerHTML='<div class="file-info" style="color:#ff6b6b;border-color:rgba(245,87,108,.3);background:rgba(245,87,108,.1)">❌ 解析失败: '+e.message+'</div>';
    }
}

function parseWorkbook(wb){
    var data={sheets:[],allText:[]};
    wb.eachSheet(function(ws){
        var sheetData={name:ws.name,rows:[]};
        ws.eachRow(function(row,rowNum){
            var rowData=[];
            row.eachCell({includeEmpty:true},function(cell,colNum){
                var val='';
                if(cell.value){
                    if(typeof cell.value==='object'&&cell.value.richText){
                        val=cell.value.richText.map(function(rt){return rt.text||''}).join('');
                    }else if(typeof cell.value==='object'&&cell.value.text){
                        val=cell.value.text;
                    }else{val=String(cell.value)}
                }
                rowData.push(val.trim());
            });
            sheetData.rows.push(rowData);
            data.allText.push(rowData.filter(Boolean).join(' '));
        });
        data.sheets.push(sheetData);
    });
    return data;
}

function showParsedSummary(){
    if(!parsedRaw)return;
    var totalRows=0;parsedRaw.sheets.forEach(function(s){totalRows+=s.rows.length});
    var html='<div class="parsed-summary">';
    html+='<div class="summary-item"><div class="lbl">工作表数</div><div class="val">'+parsedRaw.sheets.length+'</div></div>';
    html+='<div class="summary-item"><div class="lbl">总行数</div><div class="val">'+totalRows+'</div></div>';
    html+='<div class="summary-item"><div class="lbl">文本内容</div><div class="val">'+parsedRaw.allText.filter(Boolean).length+' 行</div></div>';
    html+='</div>';
    document.getElementById('parsedArea').innerHTML=html;
}

async function aiParseAndGenerate(){
    var name=document.getElementById('f_name').value.trim();
    var brand=document.getElementById('f_brand').value;
    var board=document.getElementById('f_board').value.trim();
    var lines=document.getElementById('f_lines').value.trim();
    if(!name){alert('请输入关卡名称');return}
    if(!parsedRaw||parsedRaw.allText.length===0){alert('请先上传玩法文档');return}
    paytableData.brand=brand;paytableData.name=name;paytableData.board=board;paytableData.lines=lines;
    var btn=document.getElementById('parseBtn');btn.classList.add('loading');btn.disabled=true;
    var st=document.getElementById('aiStatus');
    try{
        st.textContent='🔄 正在结构化解析玩法文档...';st.className='ai-status generating';

        // ========== STRUCTURAL PRE-PARSING ==========
        var allLines=parsedRaw.allText.filter(Boolean);
        var structured=structuralParse(allLines);

        // Determine if full-ways game
        var isFullWays=false;
        var waysNum=0;
        var gridMatch=board.match(/(\d+)\s*[xX*]\s*(\d+)/);
        if(gridMatch){
            var rows=parseInt(gridMatch[1]);var cols=parseInt(gridMatch[2]);
            if(rows>cols){var tmp=rows;rows=cols;cols=tmp}
            var maxWays=Math.pow(rows,cols);
            var linesVal=lines.replace(/[^0-9]/g,'');
            waysNum=parseInt(linesVal)||0;
            if(waysNum===maxWays||(lines.toLowerCase().includes('ways')&&waysNum>0)){isFullWays=true}
        }

        var paylineInstruction='';
        if(isFullWays){
            paylineInstruction='LAST PAGE: PAY LINES - FULL WAYS game. Use EXACT fixed content:\n'+
            'cn: "* '+waysNum+' Ways to win!" / "* 无赔付线" / "* 匹配图标在连续转轴的任何位置赔付" / "* 同一转轴上出现多个匹配的中奖图标时，赢钱额按该轴匹配数相乘" / "* 只赔付最高的中奖组合" / "* 赢钱额乘以投注倍数"\n'+
            'en: "* '+waysNum+' Ways to win!" / "* No paylines." / "* Matching symbols pay in any position on consecutive reels." / "* Matching winning symbols on the same reel multiply the win by the number matched." / "* Only the highest winning combination is paid." / "* Wins are multiplied by the bet multiplier."\n';
        }else{
            paylineInstruction='LAST PAGE: PAY LINES - State payline count and configuration.\n';
        }

        // Build structured prompt with pre-parsed sections
        var structuredContent='=== PRE-PARSED DOCUMENT STRUCTURE ===\n\n';
        structuredContent+='[BASIC INFO]\n';
        structuredContent+='关卡名: '+name+'\n';
        structuredContent+='棋盘: '+board+'\n';
        structuredContent+='线数: '+lines+'\n';
        if(structured.combo) structuredContent+='玩法组合: '+structured.combo+'\n';
        if(structured.jackpots.length) structuredContent+='Jackpot档位: '+structured.jackpots.join(', ')+'\n';
        structuredContent+='\n';

        if(structured.specialIcons.length){
            structuredContent+='[SPECIAL ICONS]\n';
            structured.specialIcons.forEach(function(ic){
                structuredContent+='- '+ic.name+': '+ic.desc+'\n';
            });
            structuredContent+='\n';
        }

        if(structured.normalIcons.length){
            structuredContent+='[NORMAL ICONS]\n';
            structured.normalIcons.forEach(function(ic){
                structuredContent+='- '+ic+'\n';
            });
            structuredContent+='\n';
        }

        if(structured.features.length){
            structuredContent+='[FEATURES - Each one needs its own page]\n';
            structured.features.forEach(function(feat,i){
                structuredContent+='\n--- FEATURE '+(i+1)+': '+feat.name+' ---\n';
                if(feat.trigger) structuredContent+='Trigger: '+feat.trigger+'\n';
                if(feat.rules.length){
                    structuredContent+='Rules:\n';
                    feat.rules.forEach(function(r){structuredContent+='  '+r+'\n'});
                }
                if(feat.endCondition) structuredContent+='End: '+feat.endCondition+'\n';
            });
        }

        st.textContent='🔄 AI正在生成Paytable内容（首次使用需授权）...';

        var prompt='Act as a slots game planner. Translate and structure a paytable for a slot game. Use professional slots terminology - SHORT, clear, readable.\n\n'+
        'Game Info: Brand='+brand+', Name='+name+', Grid='+board+', Ways/Lines='+lines+'\n\n'+
        structuredContent+'\n\n'+
        '=== CRITICAL OUTPUT RULES ===\n\n'+
        'RULE 1: Every sentence in BOTH cn and en MUST start with "* ".\n'+
        'RULE 2: Page 1 title fixed as: title="FEATURE", titleEn="FEATURE". Describes all special symbols.\n'+
        'RULE 3: NO "游戏规则/GAME RULES" page.\n'+
        'RULE 4: [WILD] split into separate items (substitution / reels / size / behavior).\n'+
        '  If WILD only does line-wins, no separate WILD feature page.\n'+
        'RULE 5: NO labels like "触发条件：" or "玩法说明：". Describe rules directly.\n'+
        'RULE 6: NO reconnection/disconnect rules. NO edge cases.\n'+
        'RULE 7: Every rule line from each feature MUST appear. Merge similar, split different.\n'+
        'RULE 8: Each distinct feature = its own page with clear feature name.\n\n'+
        '=== PAGE STRUCTURE ===\n\n'+
        'PAGE 1: FEATURE / FEATURE - All special symbols described\n'+
        'PAGE 2: PAYS / PAYS - Symbol payouts (数值待定/TBD if not specified)\n'+
        'PAGE 3+: One page per feature from [FEATURES] section above\n'+
        paylineInstruction+'\n'+
        '=== LANGUAGE ===\n'+
        'CN: 简洁, 每句"* "开头, 直接描述规则\n'+
        'EN: Professional paytable English, "* " prefix, SHORT:\n'+
        '  "* [WILD] substitutes for all except [SCATTER]." / "* 3 or more [SCATTER] triggers Wheel."\n\n'+
        '=== FORMAT ===\n'+
        'Return ONLY JSON: {"pages":[{"title":"中文","titleEn":"EN","items":[{"cn":"* ...","en":"* ..."}]}]}\n'+
        'Be thorough. Generate 5-8+ pages.';

        var raw=await callAI(prompt);
        var result=null;
        try{result=JSON.parse(raw)}catch(e){var m=raw.match(/\{[\s\S]*\}/);if(m)result=JSON.parse(m[0])}
        if(result&&result.pages){
            // Post-process: ensure PAY LINES page for full-ways games
            if(isFullWays){
                var hasPayline=result.pages.some(function(p){return(p.titleEn||'').toUpperCase().includes('PAY LINE')||(p.title||'').includes('赔付线')});
                if(!hasPayline){
                    result.pages.push({title:'赔付线',titleEn:'PAY LINES',items:[
                        {cn:'* '+waysNum+' Ways to win!',en:'* '+waysNum+' Ways to win!'},
                        {cn:'* 无赔付线',en:'* No paylines.'},
                        {cn:'* 匹配图标在连续转轴的任何位置赔付',en:'* Matching symbols pay in any position on consecutive reels.'},
                        {cn:'* 同一转轴上出现多个匹配的中奖图标时，赢钱额按该轴匹配数相乘',en:'* Matching winning symbols on the same reel multiply the win by the number matched.'},
                        {cn:'* 只赔付最高的中奖组合',en:'* Only the highest winning combination is paid.'},
                        {cn:'* 赢钱额乘以投注倍数',en:'* Wins are multiplied by the bet multiplier.'}
                    ]});
                }
            }
            paytableData.pages=result.pages;
            renderPreview();
            st.textContent='✅ 生成完成！（识别到'+structured.features.length+'个玩法）';st.className='ai-status done';
            showToast('✨ Paytable内容已生成');
            goStep(2);
        }else{st.textContent='⚠️ AI返回格式异常，请重试';st.className='ai-status error'}
    }catch(err){st.textContent='❌ '+err.message;st.className='ai-status error'}
    finally{btn.classList.remove('loading');btn.disabled=false}
}

// ========== STRUCTURAL PARSER ==========
function structuralParse(allLines){
    var result={combo:'',jackpots:[],specialIcons:[],normalIcons:[],features:[]};
    var fullText=allLines.join('\n');

    // Extract combo/架构
    var comboMatch=fullText.match(/玩法组合[：:]\s*(.+)/);
    if(comboMatch) result.combo=comboMatch[1].trim();

    // Extract jackpots
    var jpMatch=fullText.match(/jackpot[^，。\n]*(?:GRAND|MAJOR|MINOR|MINI)[^。\n]*/i);
    if(jpMatch){
        var jpText=jpMatch[0];
        ['GRAND','MAJOR','MINOR','MINI'].forEach(function(j){if(jpText.toUpperCase().includes(j))result.jackpots.push(j)});
    }
    if(!result.jackpots.length){
        // Try Chinese pattern
        if(fullText.includes('GRAND'))result.jackpots.push('GRAND');
        if(fullText.includes('MAJOR'))result.jackpots.push('MAJOR');
        if(fullText.includes('MINOR'))result.jackpots.push('MINOR');
        if(fullText.includes('MINI')&&!fullText.match(/MINI[A-Z]/))result.jackpots.push('MINI');
    }

    // Extract special icons
    var iconSection=false;
    var currentIcon=null;
    var specialKeywords=['BONUS','SCATTER','WILD','LINK','wild','scatter','bonus','link'];
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        if(line.includes('特殊图标')||line.includes('特殊图标列表')){iconSection=true;continue}
        if(line.includes('普通图标')){iconSection=false;
            // Capture normal icons
            var normMatch=line.match(/H\d|L\d/g);
            if(normMatch) result.normalIcons=result.normalIcons.concat(normMatch);
            // Scan next lines for H/L patterns
            for(var ni=i+1;ni<Math.min(i+10,allLines.length);ni++){
                var nline=allLines[ni];
                if(nline.match(/H\d|L\d/)){
                    var hls=nline.match(/[HL]\d/g);
                    if(hls) result.normalIcons=result.normalIcons.concat(hls);
                }
            }
            result.normalIcons=[...new Set(result.normalIcons)];
            continue;
        }
        if(iconSection){
            // Look for icon names in the line
            specialKeywords.forEach(function(kw){
                var regex=new RegExp(kw+'\\d*','gi');
                var matches=line.match(regex);
                if(matches){
                    matches.forEach(function(m){
                        var existing=result.specialIcons.find(function(s){return s.name.toUpperCase()===m.toUpperCase()});
                        if(!existing){
                            result.specialIcons.push({name:m.toUpperCase(),desc:''});
                        }
                    });
                }
            });
            // Check for 设计要点 descriptions
            if(line.includes('设计要点')||line.match(/^\d+[、.]/)){
                var lastIcon=result.specialIcons[result.specialIcons.length-1];
                if(lastIcon&&!lastIcon.desc) lastIcon.desc=line;
                else if(lastIcon) lastIcon.desc+='; '+line;
            }
        }
    }

    // Also scan for icon descriptions from 设计要点 rows
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        specialKeywords.forEach(function(kw){
            if(line.toUpperCase().includes(kw)&&(line.includes('设计要点')||line.includes('仅'))){
                var iconName=kw.toUpperCase();
                var numMatch=line.match(new RegExp(kw+'(\\d+)','i'));
                if(numMatch) iconName=kw.toUpperCase()+numMatch[1];
                var existing=result.specialIcons.find(function(s){return s.name===iconName});
                if(existing&&!existing.desc) existing.desc=line;
                else if(!existing) result.specialIcons.push({name:iconName,desc:line});
            }
        });
    }

    // Extract features - identify by section headers
    var featureKeywords=[
        /(?:BASE|base).*(?:玩法|WILD|wild)/,
        /(?:RESPIN|respin|Respin).*玩法/,
        /(?:FREE|free|Free)\s*(?:GAMES|games|Games|SPIN|spin)/,
        /(?:转盘|WHEEL|wheel|Wheel).*玩法/,
        /(?:收集|COLLECT|collect|升级|UPGRADE).*玩法/,
        /(?:JACKPOT|jackpot|Jackpot).*玩法/,
        /(?:PICK|pick|Pick).*玩法/,
        /(?:LINK|link|Link)\s*(?:GAME|game|Game)/,
        /Respin-buff/i,
        /(?:super|SUPER|Super)\s*(?:转盘|WHEEL|RESPIN|FREE)/i
    ];
    var genericFeaturePattern=/^[\s]*(?:[\w\s]+玩法|[\w\s]*(?:RESPIN|FREE|WHEEL|PICK|LINK|JACKPOT|BONUS|SUPER)[\w\s]*)[：:]*\s*$/i;

    var currentFeature=null;
    var inTrigger=false;
    var inRules=false;
    var inEnd=false;
    var skipPatterns=[/极限情况/,/断线重连/,/美术/,/设计要点/,/参考图标/,/分值/,/实体机/,/竞品/,/图标等级/,/图标设计/,/重点图标/];

    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        if(!line.trim()) continue;

        // Skip lines matching skip patterns
        var shouldSkip=false;
        skipPatterns.forEach(function(p){if(p.test(line))shouldSkip=true});
        if(shouldSkip){
            inTrigger=false;inRules=false;inEnd=false;
            // Skip until next section
            continue;
        }

        // Check if this line starts a new feature section
        var isFeatureHeader=false;
        featureKeywords.forEach(function(kw){if(kw.test(line))isFeatureHeader=true});
        if(!isFeatureHeader&&genericFeaturePattern.test(line)&&line.length<40) isFeatureHeader=true;

        // Special: "Respin-buff" pattern
        if(/Respin-buff|buff\d/i.test(line)&&line.length<60){
            // This is a sub-feature, append to current RESPIN feature or create new
            if(currentFeature&&/respin/i.test(currentFeature.name)){
                // Add as a rule separator within respin
                currentFeature.rules.push('【'+line.replace(/[:：]\s*/,'').trim()+'】');
                inRules=true;inTrigger=false;inEnd=false;
                continue;
            }else{
                isFeatureHeader=true;
            }
        }

        if(isFeatureHeader){
            if(currentFeature) result.features.push(currentFeature);
            var featureName=line.replace(/[:：]\s*$/,'').replace(/玩法说明/,'').trim();
            currentFeature={name:featureName,trigger:'',rules:[],endCondition:''};
            inTrigger=false;inRules=false;inEnd=false;
            continue;
        }

        if(!currentFeature) continue;

        // Detect sub-sections within a feature
        if(/触发条件/.test(line)){inTrigger=true;inRules=false;inEnd=false;continue}
        if(/玩法说明/.test(line)){inRules=true;inTrigger=false;inEnd=false;continue}
        if(/结束条件/.test(line)){inEnd=true;inTrigger=false;inRules=false;continue}

        // Collect content
        var cleanLine=line.replace(/^\d+[、.\s]+/,'').trim();
        if(!cleanLine) continue;

        if(inTrigger){
            currentFeature.trigger+=(currentFeature.trigger?'; ':'')+cleanLine;
        }else if(inEnd){
            currentFeature.endCondition+=(currentFeature.endCondition?'; ':'')+cleanLine;
        }else if(inRules||currentFeature.name){
            // Default: treat as rules
            currentFeature.rules.push(cleanLine);
        }
    }
    if(currentFeature) result.features.push(currentFeature);

    // Remove features with no meaningful content
    result.features=result.features.filter(function(f){
        return f.rules.length>0||f.trigger;
    });

    return result;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderPreview(){
    var html='';
    paytableData.pages.forEach(function(page,pi){
        html+='<div style="margin-bottom:16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden">';
        html+='<div style="padding:10px 14px;background:rgba(247,151,30,.1);display:flex;justify-content:space-between;align-items:center">';
        html+='<span style="font-weight:700;color:#ffd200;font-size:.9rem">第'+(pi+1)+'页 / Page '+(pi+1)+'</span>';
        html+='</div>';
        html+='<div style="padding:12px 14px;background:rgba(255,255,255,.02);text-align:center;border-bottom:1px solid rgba(255,255,255,.06)">';
        html+='<div style="font-weight:700;color:#ccd6f6;font-size:.95rem">'+(page.title||'')+'</div>';
        html+='<div style="font-weight:600;color:#8892b0;font-size:.85rem;font-style:italic;margin-top:2px">'+(page.titleEn||'')+'</div>';
        html+='</div>';
        html+='<table class="preview-table" style="margin:0"><thead><tr><th style="width:50%">中文内容</th><th style="width:50%">English Translation</th></tr></thead><tbody>';
        page.items.forEach(function(item){
            html+='<tr><td style="color:#e0e0e0;white-space:pre-wrap;font-size:.82rem;line-height:1.5">'+escHtml(item.cn||'')+'</td>';
            html+='<td style="color:#8892b0;white-space:pre-wrap;font-style:italic;font-size:.82rem;line-height:1.5">'+escHtml(item.en||'')+'</td></tr>';
        });
        html+='</tbody></table></div>';
    });
    if(!html) html='<div style="text-align:center;padding:40px;color:#8892b0">暂无内容，请先在步骤②中编辑</div>';
    document.getElementById('previewWrap').innerHTML=html;
}

async function exportExcel(){
    if(!paytableData.pages.length){alert('没有可导出的内容，请先生成Paytable');return}
    try{
        var wb=new ExcelJS.Workbook();
        var ws=wb.addWorksheet('paytable_市场');
        ws.columns=[{width:4},{width:50},{width:4},{width:50}];
        var bf={name:'Microsoft YaHei',size:11};
        var bld={name:'Microsoft YaHei',size:11,bold:true};
        var tf={name:'Microsoft YaHei',size:14,bold:true};
        var pageTf={name:'Microsoft YaHei',size:16,bold:true};
        var redFont={name:'Microsoft YaHei',size:10,color:{argb:'FFFF0000'}};
        var al={vertical:'middle',horizontal:'left',wrapText:true};
        var alc={vertical:'middle',horizontal:'center',wrapText:true};
        var r=1;

        // Document title
        ws.mergeCells('A'+r+':B'+r);
        ws.getCell('A'+r).value=paytableData.brand+paytableData.name+'：paytable需求';
        ws.getCell('A'+r).font=pageTf;
        ws.mergeCells('C'+r+':D'+r);
        ws.getCell('C'+r).value='翻译（增删改查此列翻译）';
        ws.getCell('C'+r).font=redFont;
        ws.getRow(r).height=30;r++;r++;

        paytableData.pages.forEach(function(page,pi){
            // Page separator with page number
            ws.mergeCells('A'+r+':B'+r);
            ws.getCell('A'+r).value='第'+(pi+1)+'页';
            ws.getCell('A'+r).font=bld;
            ws.getCell('A'+r).alignment=alc;
            ws.getCell('A'+r).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
            ws.mergeCells('C'+r+':D'+r);
            ws.getCell('C'+r).value='Page '+(pi+1);
            ws.getCell('C'+r).font=bld;
            ws.getCell('C'+r).alignment=alc;
            ws.getCell('C'+r).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
            ws.getRow(r).height=20;r++;

            // Page title (feature name)
            ws.mergeCells('A'+r+':B'+r);
            ws.getCell('A'+r).value=page.title||'';
            ws.getCell('A'+r).font=tf;
            ws.getCell('A'+r).alignment=alc;
            ws.mergeCells('C'+r+':D'+r);
            ws.getCell('C'+r).value=page.titleEn||'';
            ws.getCell('C'+r).font=tf;
            ws.getCell('C'+r).alignment=alc;
            ws.getRow(r).height=26;r++;

            // Items (each rule)
            page.items.forEach(function(item){
                var cnText=item.cn||'';
                var enText=item.en||'';
                var cnLines=cnText.split('\n');
                var enLines=enText.split('\n');
                var maxL=Math.max(cnLines.length,enLines.length,1);

                ws.getCell('B'+r).value=cnText;
                ws.getCell('B'+r).font=bf;
                ws.getCell('B'+r).alignment=al;
                ws.getCell('D'+r).value=enText;
                ws.getCell('D'+r).font=bf;
                ws.getCell('D'+r).alignment=al;
                ws.getRow(r).height=Math.max(18,maxL*15);
                r++;
            });
            // Blank row between pages
            ws.getRow(r).height=10;r++;
        });

        var buf=await wb.xlsx.writeBuffer();
        var filename=paytableData.brand+paytableData.name+'：paytable需求文档.xlsx';
        saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),filename);
        showToast('✅ Paytable文档已下载！');
    }catch(err){alert('导出失败：'+err.message)}
}

document.addEventListener('DOMContentLoaded',function(){
    var ua=document.getElementById('uploadArea');
    if(ua){
        ua.addEventListener('dragover',function(e){e.preventDefault();ua.classList.add('dragover')});
        ua.addEventListener('dragleave',function(){ua.classList.remove('dragover')});
        ua.addEventListener('drop',function(e){e.preventDefault();ua.classList.remove('dragover');
            var f=e.dataTransfer.files[0];if(f){var dt=new DataTransfer();dt.items.add(f);ua.querySelector('input').files=dt.files;handleFileUpload(ua.querySelector('input'))}
        });
    }
});
