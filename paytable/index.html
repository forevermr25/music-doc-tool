<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老虎机Paytable需求文档生成器</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;padding:28px 14px;color:#e0e0e0}
.container{max-width:1100px;margin:0 auto}
h1{text-align:center;font-size:1.8rem;margin-bottom:8px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:#8892b0;margin-bottom:24px;font-size:0.9rem}
.step-nav{display:flex;justify-content:center;gap:4px;margin-bottom:22px;flex-wrap:wrap}
.step-btn{padding:10px 18px;border:none;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,.05);color:#8892b0;border:1px solid rgba(255,255,255,.1);transition:all .3s;font-family:inherit}
.step-btn:hover{color:#ccd6f6;border-color:rgba(247,151,30,.3)}
.step-btn.active{background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a2e;border-color:transparent}
.step-panel{display:none}.step-panel.active{display:block}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;margin-bottom:18px;backdrop-filter:blur(10px)}
.card-title{font-size:1rem;font-weight:600;color:#ccd6f6;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.form-group{margin-bottom:16px}
.form-row{display:flex;gap:12px}.form-row .form-group{flex:1}
label{display:block;font-size:.84rem;font-weight:600;margin-bottom:5px;color:#ccd6f6}
input[type="text"],input[type="number"],textarea,select{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#e0e0e0;font-size:.88rem;font-family:inherit;transition:border-color .3s}
input:focus,textarea:focus,select:focus{outline:none;border-color:#f7971e;box-shadow:0 0 0 2px rgba(247,151,30,.12)}
textarea{min-height:80px;resize:vertical;line-height:1.5}
select{cursor:pointer;appearance:none;padding-right:28px}
select option{background:#1a1a2e;color:#e0e0e0}
.info-tip{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:rgba(79,172,254,.06);border:1px solid rgba(79,172,254,.15);border-radius:7px;margin-bottom:14px;font-size:.8rem;color:#8892b0;line-height:1.5}
.info-tip::before{content:'💡';flex-shrink:0}
.btn-primary{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none;margin:0 auto}
.btn-primary.loading .spinner{display:inline-block}.btn-primary.loading .btn-text{display:none}
.btn-export{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#f7971e,#ffd200);border:none;border-radius:10px;color:#1a1a2e;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .2s;margin-top:12px}
.btn-export:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(247,151,30,.3)}
.btn-export:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-add{padding:6px 12px;background:rgba(247,151,30,.1);border:1px solid rgba(247,151,30,.25);border-radius:6px;color:#ffd200;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-add:hover{background:rgba(247,151,30,.2)}
.btn-danger{padding:4px 8px;background:rgba(245,87,108,.08);border:1px solid rgba(245,87,108,.2);border-radius:4px;color:#ff6b6b;font-size:.72rem;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:rgba(245,87,108,.15)}
.ai-status{font-size:.78rem;color:#8892b0;margin-top:8px;min-height:1.2em}
.ai-status.generating{color:#a78bfa}.ai-status.error{color:#ff6b6b}.ai-status.done{color:#27ae60}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<style>
.success-toast{position:fixed;top:18px;right:18px;padding:14px 20px;background:rgba(39,174,96,.95);color:#fff;border-radius:8px;font-weight:600;transform:translateX(120%);transition:transform .4s ease;z-index:1000;font-size:.88rem}
.success-toast.show{transform:translateX(0)}
.upload-area{border:2px dashed rgba(255,255,255,.15);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.upload-area:hover,.upload-area.dragover{border-color:#f7971e;background:rgba(247,151,30,.05)}
.upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-area .icon{font-size:2.5rem;margin-bottom:10px}
.upload-area .text{font-size:.9rem;color:#ccd6f6;margin-bottom:4px}
.upload-area .hint{font-size:.78rem;color:#8892b0}
.file-info{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:8px;margin-top:12px;font-size:.85rem;color:#27ae60}
.parsed-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:12px}
.summary-item{padding:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px}
.summary-item .lbl{font-size:.72rem;color:#8892b0;margin-bottom:3px}
.summary-item .val{font-size:.9rem;font-weight:600;color:#ffd200}
.page-section{margin-bottom:14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.page-header{padding:10px 14px;background:rgba(247,151,30,.08);font-weight:600;color:#ffd200;font-size:.84rem;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.page-content{padding:14px}
.feature-block{background:rgba(255,255,255,.02);border-left:3px solid rgba(247,151,30,.4);padding:10px 14px;margin-bottom:10px;border-radius:0 6px 6px 0}
.feature-block .ft-title{font-weight:600;color:#ccd6f6;font-size:.84rem;margin-bottom:4px}
.editable-area{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 10px;min-height:30px;outline:none;font-size:.82rem;line-height:1.5;color:#e0e0e0;transition:all .2s;width:100%;font-family:inherit}
.editable-area:focus{border-color:#f7971e;background:rgba(255,255,255,.06)}
.preview-wrap{max-height:650px;overflow:auto;border:1px solid rgba(255,255,255,.08);border-radius:8px}
.preview-table{width:100%;border-collapse:collapse;font-size:.8rem}
.preview-table th{padding:8px 10px;background:rgba(247,151,30,.1);border:1px solid rgba(255,255,255,.08);color:#ffd200;font-weight:600;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:2}
.preview-table td{padding:6px 10px;border:1px solid rgba(255,255,255,.06);vertical-align:top}
.preview-table tr:hover{background:rgba(255,255,255,.02)}
@media(max-width:768px){body{padding:16px 8px}.form-row{flex-direction:column;gap:0}.step-nav{gap:2px}.step-btn{padding:8px 10px;font-size:.76rem}.parsed-summary{grid-template-columns:1fr 1fr}}
.icon-upload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px}
.icon-upload-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px;text-align:center;transition:border-color .3s}
.icon-upload-item:hover{border-color:rgba(247,151,30,.4)}
.icon-upload-item .icon-name{font-size:.78rem;font-weight:600;color:#ffd200;margin-bottom:6px}
.icon-upload-item .icon-drop{width:100%;height:80px;border:2px dashed rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .3s}
.icon-upload-item .icon-drop:hover,.icon-upload-item .icon-drop.dragover{border-color:#f7971e;background:rgba(247,151,30,.05)}
.icon-upload-item .icon-drop img{max-width:100%;max-height:76px;object-fit:contain}
.icon-upload-item .icon-drop .placeholder{font-size:.7rem;color:#8892b0;text-align:center}
.icon-upload-item .icon-drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.icon-upload-item.has-image .icon-drop{border-style:solid;border-color:rgba(39,174,96,.4)}
.preview-icon-img{display:inline-block;width:40px;height:40px;object-fit:contain;vertical-align:middle;margin:0 4px;border-radius:4px;background:rgba(255,255,255,.05)}
</style>
</head>
<body>
<div class="container">
<h1>🎰 老虎机Paytable需求文档生成器</h1>
<p class="subtitle">导入玩法文档 · AI智能解析 · 中英对照 · 一键导出</p>
<div class="step-nav">
<button class="step-btn active" onclick="goStep(1)">① 导入文档</button>
<button class="step-btn" onclick="goStep(2)">② 预览导出</button>
</div>

<div class="step-panel active" id="step1">
<div class="card">
<div class="card-title">📂 导入玩法文档</div>
<div class="info-tip">上传玩法文档(.xlsx)，系统将自动解析关卡名称、图标信息、玩法规则等内容，并通过AI生成中英对照的Paytable文档。</div>
<div class="upload-area" id="uploadArea">
<div class="icon">📄</div>
<div class="text">点击或拖拽上传玩法文档</div>
<div class="hint">支持 .xlsx / .xls 格式</div>
<input type="file" accept=".xlsx,.xls" onchange="handleFileUpload(this)">
</div>
<div id="fileInfoArea"></div>
<div id="parsedArea"></div>
</div>
<div class="card">
<div class="card-title">⚙️ 基本设置</div>
<div class="form-row">
<div class="form-group"><label>品牌</label><select id="f_brand"><option>CTS</option><option>JMS</option><option>JFS</option></select></div>
<div class="form-group"><label>关卡名称</label><input type="text" id="f_name" placeholder="从文档自动提取"></div>
</div>
<div class="form-row">
<div class="form-group"><label>棋盘布局</label><input type="text" id="f_board" placeholder="如: 3X5、5X3"></div>
<div class="form-group"><label>线数/Ways</label><input type="text" id="f_lines" placeholder="如: 25线、243ways"></div>
</div>
</div>
<button class="btn-primary" id="parseBtn" onclick="aiParseAndGenerate()">
<span class="btn-text">🤖 AI 解析并生成Paytable</span><span class="spinner"></span>
</button>
<div class="ai-status" id="aiStatus"></div>
</div>

<div class="step-panel" id="step2">
<div class="card">
<div class="card-title">🖼️ 图标图片</div>
<div class="info-tip">根据文档识别的图标列表，点击或拖拽添加对应图片。图片将嵌入到导出的Excel文档中。</div>
<div id="iconUploadArea"></div>
</div>
<div class="card">
<div class="card-title">👁️ 文档预览</div>
<div class="preview-wrap" id="previewWrap"></div>
</div>
<button class="btn-export" onclick="exportExcel()">📥 一键导出Paytable文档 (.xlsx)</button>
</div>
</div>
<div class="success-toast" id="toast"></div>

<script>
'use strict';
var paytableData={brand:'CTS',name:'',board:'',lines:'',pages:[]};
var parsedRaw=null;
var iconImages={}; // {iconName: base64DataUrl}

function goStep(n){
    document.querySelectorAll('.step-btn').forEach(function(b,i){b.classList.toggle('active',i===n-1)});
    document.querySelectorAll('.step-panel').forEach(function(p,i){p.classList.toggle('active',i===n-1)});
    if(n===2){renderIconUploadArea();renderPreview()}
}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

var aiReady=false,puterLoading=false;
function loadPuterJS(){
    return new Promise(function(resolve,reject){
        if(aiReady){resolve();return}
        if(puterLoading){var w=setInterval(function(){if(aiReady){clearInterval(w);resolve()}},300);setTimeout(function(){clearInterval(w);reject(new Error('加载超时'))},30000);return}
        puterLoading=true;
        var s=document.createElement('script');s.src='https://js.puter.com/v2/';
        s.onload=function(){var e=0;var t=setInterval(function(){e+=500;if(typeof puter!=='undefined'&&puter.ai){aiReady=true;clearInterval(t);resolve()}if(e>=30000){clearInterval(t);puterLoading=false;reject(new Error('Puter.js初始化超时'))}},500)};
        s.onerror=function(){puterLoading=false;reject(new Error('Puter.js加载失败'))};
        document.head.appendChild(s);
    });
}
async function callAI(prompt){
    await loadPuterJS();
    var r=await puter.ai.chat(prompt,{model:'gpt-4o',temperature:0.7});
    if(typeof r==='string')return r;
    if(r&&r.message&&r.message.content){var c=r.message.content;if(Array.isArray(c))return c.map(function(x){return x.text||x}).join('');return c}
    if(r&&r.text)return r.text;
    return String(r);
}

async function handleFileUpload(input){
    var file=input.files[0];if(!file)return;
    document.getElementById('fileInfoArea').innerHTML='<div class="file-info">📎 已选择: '+file.name+' ('+Math.round(file.size/1024)+'KB)</div>';
    try{
        var wb=new ExcelJS.Workbook();
        var buf=await file.arrayBuffer();
        await wb.xlsx.load(buf);
        parsedRaw=parseWorkbook(wb);
        showParsedSummary();
        var match=file.name.match(/(?:CTS|JFS|JMS)\s*(.+?)[:：]/);
        if(match)document.getElementById('f_name').value=match[1].trim();
        var brandMatch=file.name.match(/(CTS|JFS|JMS)/);
        if(brandMatch)document.getElementById('f_brand').value=brandMatch[1];
    }catch(e){
        document.getElementById('fileInfoArea').innerHTML='<div class="file-info" style="color:#ff6b6b;border-color:rgba(245,87,108,.3);background:rgba(245,87,108,.1)">❌ 解析失败: '+e.message+'</div>';
    }
}

function parseWorkbook(wb){
    var data={sheets:[],allText:[]};
    wb.eachSheet(function(ws){
        var sheetData={name:ws.name,rows:[]};
        ws.eachRow(function(row,rowNum){
            var rowData=[];
            row.eachCell({includeEmpty:true},function(cell,colNum){
                var val='';
                if(cell.value){
                    if(typeof cell.value==='object'&&cell.value.richText){
                        val=cell.value.richText.map(function(rt){return rt.text||''}).join('');
                    }else if(typeof cell.value==='object'&&cell.value.text){
                        val=cell.value.text;
                    }else{val=String(cell.value)}
                }
                rowData.push(val.trim());
            });
            sheetData.rows.push(rowData);
            data.allText.push(rowData.filter(Boolean).join(' '));
        });
        data.sheets.push(sheetData);
    });
    return data;
}

function showParsedSummary(){
    if(!parsedRaw)return;
    var totalRows=0;parsedRaw.sheets.forEach(function(s){totalRows+=s.rows.length});
    var html='<div class="parsed-summary">';
    html+='<div class="summary-item"><div class="lbl">工作表数</div><div class="val">'+parsedRaw.sheets.length+'</div></div>';
    html+='<div class="summary-item"><div class="lbl">总行数</div><div class="val">'+totalRows+'</div></div>';
    html+='<div class="summary-item"><div class="lbl">文本内容</div><div class="val">'+parsedRaw.allText.filter(Boolean).length+' 行</div></div>';
    html+='</div>';
    document.getElementById('parsedArea').innerHTML=html;
}

async function aiParseAndGenerate(){
    var name=document.getElementById('f_name').value.trim();
    var brand=document.getElementById('f_brand').value;
    var board=document.getElementById('f_board').value.trim();
    var lines=document.getElementById('f_lines').value.trim();
    if(!name){alert('请输入关卡名称');return}
    if(!parsedRaw||parsedRaw.allText.length===0){alert('请先上传玩法文档');return}
    paytableData.brand=brand;paytableData.name=name;paytableData.board=board;paytableData.lines=lines;
    var btn=document.getElementById('parseBtn');btn.classList.add('loading');btn.disabled=true;
    var st=document.getElementById('aiStatus');
    try{
        st.textContent='🔄 正在结构化解析玩法文档...';st.className='ai-status generating';

        // ========== STRUCTURAL PRE-PARSING ==========
        var allLines=parsedRaw.allText.filter(Boolean);
        var structured=structuralParse(allLines);

        // Determine if full-ways game
        var isFullWays=false;
        var waysNum=0;
        var gridMatch=board.match(/(\d+)\s*[xX*]\s*(\d+)/);
        if(gridMatch){
            var rows=parseInt(gridMatch[1]);var cols=parseInt(gridMatch[2]);
            if(rows>cols){var tmp=rows;rows=cols;cols=tmp}
            var maxWays=Math.pow(rows,cols);
            var linesVal=lines.replace(/[^0-9]/g,'');
            waysNum=parseInt(linesVal)||0;
            if(waysNum===maxWays||(lines.toLowerCase().includes('ways')&&waysNum>0)){isFullWays=true;if(!waysNum)waysNum=maxWays}
        }
        // Also detect "满线" keyword
        if(lines.includes('满线')||lines.includes('满')){
            isFullWays=true;
            if(!waysNum&&gridMatch){
                var rows2=parseInt(gridMatch[1]);var cols2=parseInt(gridMatch[2]);
                if(rows2>cols2){var t2=rows2;rows2=cols2;cols2=t2}
                waysNum=Math.pow(rows2,cols2);
            }
            if(!waysNum) waysNum=243; // default fallback
        }

        var paylineInstruction='';
        if(isFullWays){
            paylineInstruction='LAST PAGE: PAY LINES - FULL WAYS game. Use EXACT fixed content:\n'+
            'cn: "* '+waysNum+' Ways to win!" / "* 无赔付线" / "* 匹配图标在连续转轴的任何位置赔付" / "* 同一转轴上出现多个匹配的中奖图标时，赢钱额按该轴匹配数相乘" / "* 只赔付最高的中奖组合" / "* 赢钱额乘以投注倍数"\n'+
            'en: "* '+waysNum+' Ways to win!" / "* No paylines." / "* Matching symbols pay in any position on consecutive reels." / "* Matching winning symbols on the same reel multiply the win by the number matched." / "* Only the highest winning combination is paid." / "* Wins are multiplied by the bet multiplier."\n';
        }else{
            paylineInstruction='LAST PAGE: PAY LINES - State payline count and configuration.\n';
        }

        // Build structured prompt with pre-parsed sections
        var structuredContent='=== PRE-PARSED DOCUMENT STRUCTURE ===\n\n';
        structuredContent+='[BASIC INFO]\n';
        structuredContent+='关卡名: '+name+'\n';
        structuredContent+='棋盘: '+board+'\n';
        structuredContent+='线数: '+lines+'\n';
        if(structured.combo) structuredContent+='玩法组合: '+structured.combo+'\n';
        if(structured.jackpots.length) structuredContent+='Jackpot档位: '+structured.jackpots.join(', ')+'\n';
        structuredContent+='\n';

        if(structured.specialIcons.length){
            structuredContent+='[SPECIAL ICONS - Functional descriptions only]\n';
            structured.specialIcons.forEach(function(ic){
                structuredContent+='- '+ic.name+':';
                if(ic.functions.length) structuredContent+=' '+ic.functions.join(' | ');
                else structuredContent+=' (no functional description found)';
                structuredContent+='\n';
            });
            if(structured.iconRelations.length){
                structuredContent+='Icon Relations: ';
                structured.iconRelations.forEach(function(rel){
                    structuredContent+=rel.icon+'->'+rel.target+' ';
                });
            }
            structuredContent+='\n';
        }

        if(structured.normalIcons.length){
            structuredContent+='[NORMAL ICONS]\n';
            structured.normalIcons.forEach(function(ic){
                structuredContent+='- '+ic+'\n';
            });
            if(!structured.hasPayoutValues){
                structuredContent+='** PAYOUT VALUES: NOT FOUND IN DOCUMENT. All values are "/" or empty. You MUST output "数值待定" / "Values TBD" for ALL symbols. Do NOT invent values. **\n';
            }
            structuredContent+='\n';
        }

        if(structured.features.length){
            var buffCount=structured.features.filter(function(f){return/buff/i.test(f.name)}).length;
            structuredContent+='[FEATURES - Output pages in THIS EXACT ORDER. Do NOT reorder or merge.]\n';
            structuredContent+='Total features: '+structured.features.length+'. You MUST generate '+structured.features.length+' feature pages.\n';
            if(buffCount>0) structuredContent+='Buff features detected: '+buffCount+'. Each buff MUST be described with its specific mechanic.\n';
            structured.features.forEach(function(feat,i){
                structuredContent+='\n--- FEATURE '+(i+1)+': '+feat.name+' ---\n';
                if(feat.trigger) structuredContent+='Trigger: '+feat.trigger+'\n';
                if(feat.rules.length){
                    structuredContent+='Rules:\n';
                    feat.rules.forEach(function(r){structuredContent+='  '+r+'\n'});
                }
                if(feat.wheelRewards&&feat.wheelRewards.length){
                    structuredContent+='Wheel Rewards (list ALL of these specifically):\n';
                    feat.wheelRewards.forEach(function(wr){structuredContent+='  '+wr+'\n'});
                }
                if(feat.endCondition) structuredContent+='End: '+feat.endCondition+'\n';
            });
        }

        st.textContent='🔄 AI正在生成Paytable内容（首次使用需授权）...';

        var prompt='Act as a Senior Slot Game Designer and Paytable Writer.\n'+
        'Write a PLAYER-FACING Paytable Document based on the gameplay document.\n\n'+
        'Game Info: Brand='+brand+' Game Name='+name+' Grid='+board+' Ways/Lines='+lines+'\n\n'+
        structuredContent+'\n\n'+
        '==================================================\n'+
        'FEATURE IDENTIFICATION ENGINE\n\n'+
        'Before generating pages:\n'+
        'Identify every gameplay feature from the document.\n'+
        'Classify features into:\n'+

        'Forbidden prefixes: "Trigger:" "Rules:" "End:"\n'+
        'Only bullet descriptions.\n\n'+
        '==================================================\n'+

        'PAGE 2: PAYS - Symbol payouts. If payout values are missing: Output "数值待定" / "To Be Determined". Never invent values.\n'+
        'PAGE 3+: Feature Pages - Generate ONE page per feature. Use EXACT document order. Never rearrange.\n'+
        'LAST PAGE: PAY LINES - Use provided payline instruction.\n\n'+

        '    * 6个及以上[BONUS]触发Respin\n'+
        '    * 收集[BONUS1][BONUS2][BONUS3]触发Buff玩法\n'+

        '  Wheel Trigger → Wheel Feature\n'+
        '  Upgrade Trigger → Upgrade Feature\n'+
        'Never mix triggers between features.\n\n'+
        '==================================================\n'+
        'LANGUAGE RULES\n\n'+
        'Chinese: Concise, Player-facing, Use original symbol names\n'+
        'English: Professional slot terminology, Casino style wording\n'+
        '  Examples:\n'+
        '  * [WILD] substitutes for all symbols except [SCATTER], [BONUS1], and [BONUS2].\n'+
        '  * 3 or more [SCATTER] anywhere trigger Free Games.\n'+
        '  * 6 or more [BONUS] symbols trigger Hold & Spin.\n'+
        '  * Any new symbol resets the respin counter to 3.\n\n'+
        '==================================================\n'+
        'CRITICAL RULES\n\n'+
        'RULE 1: Every sentence MUST begin with "* " in both cn and en.\n'+
        'RULE 2: FEATURE page title: title="FEATURE" titleEn="FEATURE"\n'+
        'RULE 3: One Feature = One Page\n'+
        'RULE 4: All Buffs belong inside their Feature Page\n'+
        'RULE 5: Never summarize rewards using: etc. / and more / various / 等. List every reward explicitly.\n'+
        'RULE 6: Generate every feature page found in document. Missing a feature page = failure.\n'+
        'RULE 7: Output order MUST match gameplay document order.\n\n'+
        paylineInstruction+'\n'+
        '==================================================\n'+
        'OUTPUT FORMAT\n\n'+
        'Return ONLY valid JSON:\n'+
        '{"pages":[{"title":"中文标题","titleEn":"ENGLISH FEATURE NAME","items":[{"cn":"* 中文内容","en":"* English Content"}]}]}';

        var raw=await callAI(prompt);
        var result=null;
        try{result=JSON.parse(raw)}catch(e){var m=raw.match(/\{[\s\S]*\}/);if(m)result=JSON.parse(m[0])}
        if(result&&result.pages){
            // Post-process: ensure PAY LINES page for full-ways games
            if(isFullWays){
                var hasPayline=result.pages.some(function(p){return(p.titleEn||'').toUpperCase().includes('PAY LINE')||(p.title||'').includes('赔付线')});
                if(!hasPayline){
                    result.pages.push({title:'赔付线',titleEn:'PAY LINES',items:[
                        {cn:'* '+waysNum+' Ways to win!',en:'* '+waysNum+' Ways to win!'},
                        {cn:'* 无赔付线',en:'* No paylines.'},
                        {cn:'* 匹配图标在连续转轴的任何位置赔付',en:'* Matching symbols pay in any position on consecutive reels.'},
                        {cn:'* 同一转轴上出现多个匹配的中奖图标时，赢钱额按该轴匹配数相乘',en:'* Matching winning symbols on the same reel multiply the win by the number matched.'},
                        {cn:'* 只赔付最高的中奖组合',en:'* Only the highest winning combination is paid.'},
                        {cn:'* 赢钱额乘以投注倍数',en:'* Wins are multiplied by the bet multiplier.'}
                    ]});
                }
            }
            // Post-process: force "数值待定" on PAYS page if no payout values in document
            if(!structured.hasPayoutValues){
                result.pages.forEach(function(p){
                    if((p.titleEn||'').toUpperCase()==='PAYS'||(p.title||'').includes('赔付')){
                        var correctItems=[];
                        structured.normalIcons.forEach(function(ic){
                            correctItems.push({cn:'* '+ic+': 数值待定',en:'* '+ic+': Values TBD'});
                        });
                        if(correctItems.length) p.items=correctItems;
                    }
                });
            }
            paytableData.pages=result.pages;
            // Post-process: check if AI missed features
            var featurePageCount=result.pages.filter(function(p){
                var t=(p.titleEn||'').toUpperCase();
                return t!=='FEATURE'&&t!=='PAYS'&&!t.includes('PAY LINE');
            }).length;
            var expectedFeatures=structured.features.length;
            var warningMsg='';
            if(featurePageCount<expectedFeatures){
                warningMsg=' ⚠️ 注意：识别到'+expectedFeatures+'个玩法但只生成了'+featurePageCount+'个玩法页，可能有遗漏，建议重新生成。';
            }
            renderIconUploadArea();
            renderPreview();
            st.textContent='✅ 生成完成！（识别到'+expectedFeatures+'个玩法，生成'+featurePageCount+'个玩法页）'+warningMsg;st.className='ai-status done';
            showToast('✨ Paytable内容已生成');
            goStep(2);
        }else{st.textContent='⚠️ AI返回格式异常，请重试';st.className='ai-status error'}
    }catch(err){st.textContent='❌ '+err.message;st.className='ai-status error'}
    finally{btn.classList.remove('loading');btn.disabled=false}
}

// ========== STRUCTURAL PARSER ==========
function structuralParse(allLines){
    var result={combo:'',jackpots:[],specialIcons:[],normalIcons:[],features:[],iconRelations:[]};
    var fullText=allLines.join('\n');

    // ---- 1. Basic info extraction ----
    var comboMatch=fullText.match(/玩法组合[：:]\s*(.+)/);
    if(comboMatch) result.combo=comboMatch[1].trim();

    // Jackpots - ordered high to low
    ['GRAND','MAJOR','MINOR','MINI'].forEach(function(j){
        // Make sure MINI doesn't match MINOR
        if(j==='MINI'){
            if(/\bMINI\b/.test(fullText)&&!/MINI[A-Z]/.test(fullText.replace(/MINOR/g,''))) result.jackpots.push(j);
        }else{
            if(fullText.includes(j)) result.jackpots.push(j);
        }
    });

    // ---- 2. Icon extraction with FUNCTIONAL descriptions ----
    var designKeywords=['超框','底色','颜色','设计','外观','动画','表现','拟人','质感','特殊设计','无框','固有色'];
    function isDesignDesc(text){
        return designKeywords.some(function(k){return text.includes(k)})&&!text.includes('触发')&&!text.includes('替代')&&!text.includes('出现在')&&!text.includes('携带');
    }
    function isFunctionalDesc(text){
        var funcKeys=['触发','替代','代替','出现在','仅在','仅出现','携带','收集','落地','掉落','变为','可替代','参与连线','集满'];
        return funcKeys.some(function(k){return text.includes(k)});
    }

    var iconSection=false;
    var iconHeaderLine=-1;
    var iconNames=[];
    var specialKeywords=['BONUS','SCATTER','WILD','LINK','wild','scatter','bonus','link','frame'];

    // BASELINE: Always scan full document for core slot icon types (scatter/bonus/wild/link)
    // These are fundamental slot icons that must be detected regardless of document structure
    var coreIconTypes=['SCATTER','BONUS','WILD','LINK'];
    var fullTextUpper=fullText.toUpperCase();
    coreIconTypes.forEach(function(core){
        // Match core type with optional number suffix or prefix (e.g. BONUS1, 整列WILD, SUPER LINK)
        var regex=new RegExp('(?:^|[\\s，,、;；\\[\\]【】])(?:[\\u4e00-\\u9fff]*)?'+core+'\\d*(?=[\\s，,、;；\\[\\]【】]|$)','gm');
        var matches=fullTextUpper.match(regex);
        if(matches){
            matches.forEach(function(m){
                var cleaned=m.replace(/[\s，,、;；\[\]【】\u4e00-\u9fff]/g,'').trim();
                if(cleaned&&iconNames.indexOf(cleaned)===-1) iconNames.push(cleaned);
            });
        }
        // Also try simpler pattern for common formats
        var simpleRegex=new RegExp(core+'\\d*','gi');
        var simpleMatches=fullText.match(simpleRegex);
        if(simpleMatches){
            simpleMatches.forEach(function(m){
                var upper=m.toUpperCase();
                if(iconNames.indexOf(upper)===-1) iconNames.push(upper);
            });
        }
    });

    // Also scan the icon section specifically for additional names (frame, special variants, etc.)
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        if(line.includes('特殊图标列表')||line.includes('特殊图标')){
            iconSection=true;iconHeaderLine=i;
            var nextLines=allLines.slice(i,Math.min(i+3,allLines.length)).join(' ');
            specialKeywords.forEach(function(kw){
                var regex=new RegExp(kw+'\\d*','gi');
                var matches=nextLines.match(regex);
                if(matches) matches.forEach(function(m){
                    var upper=m.toUpperCase();
                    if(iconNames.indexOf(upper)===-1) iconNames.push(upper);
                });
            });
            continue;
        }
        if(iconSection&&(line.includes('普通图标')||line.includes('图标等级'))){
            iconSection=false;
            continue;
        }
        if(iconSection){
            specialKeywords.forEach(function(kw){
                var regex=new RegExp('\\b'+kw+'\\d*\\b','gi');
                var matches=line.match(regex);
                if(matches) matches.forEach(function(m){
                    var upper=m.toUpperCase();
                    if(iconNames.indexOf(upper)===-1) iconNames.push(upper);
                });
            });
        }
    }

    // Deduplicate: if we have both "WILD" and "WILD1", keep both. 
    // But remove generic "BONUS" if specific BONUS1/2/3 exist
    var hasNumberedBonus=iconNames.some(function(n){return/^BONUS\d+$/.test(n)});
    if(hasNumberedBonus) iconNames=iconNames.filter(function(n){return n!=='BONUS'});
    var hasNumberedLink=iconNames.some(function(n){return/^LINK\d+$/.test(n)});
    if(hasNumberedLink) iconNames=iconNames.filter(function(n){return n!=='LINK'});

    // Build special icons with functional descriptions only
    iconNames.forEach(function(name){
        result.specialIcons.push({name:name,functions:[],relations:[]});
    });

    // Scan full document for functional descriptions of each icon
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        if(!line.trim()) continue;

        result.specialIcons.forEach(function(icon){
            // Match icon name in line (case insensitive, with or without brackets)
            var nameVariants=[icon.name, icon.name.toLowerCase()];
            var found=nameVariants.some(function(v){return line.includes(v)});
            if(!found) return;

            // Accept functional descriptions OR trigger-related lines
            if(isFunctionalDesc(line)||/触发|trigger/i.test(line)){
                var cleanLine=line.replace(/^\d+[、.\s：:]+/,'').trim();
                // Skip pure design lines
                if(isDesignDesc(cleanLine)&&!isFunctionalDesc(cleanLine)) return;
                if(cleanLine&&icon.functions.indexOf(cleanLine)===-1){
                    icon.functions.push(cleanLine);
                }
            }
        });

        // Detect icon relations (bonus1 -> 收集区1)
        var relMatch=line.match(/(bonus\d+|BONUS\d+).*(?:收集|对应).*(收集区\d+|玩法\d+|RESPIN\d*)/i);
        if(relMatch){
            result.iconRelations.push({icon:relMatch[1].toUpperCase(),target:relMatch[2]});
        }
    }

    // Also scan feature triggers to find SCATTER/BONUS trigger rules
    // This catches cases like "3个及以上SCATTER触发转盘" in feature sections
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        if(!line.trim()) continue;
        // Look for trigger patterns mentioning special icons
        result.specialIcons.forEach(function(icon){
            var nameLC=icon.name.toLowerCase();
            var lineLC=line.toLowerCase();
            if(lineLC.includes(nameLC)&&(/个.*触发|触发.*玩法|or more.*trigger/i.test(line))){
                var cleanLine=line.replace(/^\d+[、.\s：:]+/,'').trim();
                if(cleanLine&&icon.functions.indexOf(cleanLine)===-1){
                    icon.functions.push(cleanLine);
                }
            }
        });
    }

    // Add WILD default substitution rule if not already captured
    var wildIcon=result.specialIcons.find(function(ic){return ic.name==='WILD'||ic.name.includes('WILD')});
    if(wildIcon){
        var hasSubRule=wildIcon.functions.some(function(f){return f.includes('替代')||f.includes('代替')||f.includes('substitut')||f.includes('替换')});
        if(!hasSubRule){
            // Build exclusion list from all non-WILD special icons
            var excludeList=result.specialIcons.filter(function(ic){return!ic.name.includes('WILD')}).map(function(ic){return'['+ic.name+']'});
            if(excludeList.length){
                wildIcon.functions.unshift('[WILD]可替代除'+excludeList.join('、')+'外的所有图标');
            }else{
                wildIcon.functions.unshift('[WILD]可替代所有H图标和L图标');
            }
        }
        // Add reel info if found in functions or design notes
        var hasReelInfo=wildIcon.functions.some(function(f){return/\d.*列|reel/i.test(f)});
        if(!hasReelInfo){
            // Scan for wild reel info in all lines
            for(var wi=0;wi<allLines.length;wi++){
                var wline=allLines[wi].toLowerCase();
                if(wline.includes('wild')&&(/[2345].*列|2.*3.*4.*5/i.test(allLines[wi]))){
                    var reelLine=allLines[wi].replace(/^\d+[、.\s：:]+/,'').trim();
                    if(reelLine&&wildIcon.functions.indexOf(reelLine)===-1){
                        wildIcon.functions.push(reelLine);
                        break;
                    }
                }
            }
        }
    }

    // Normal icons
    var normSet=new Set();
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        if(line.includes('普通图标')){
            var hls=line.match(/[HL]\d/g);
            if(hls) hls.forEach(function(h){normSet.add(h)});
            for(var ni=i+1;ni<Math.min(i+5,allLines.length);ni++){
                var nline=allLines[ni];
                var nhls=nline.match(/[HL]\d/g);
                if(nhls) nhls.forEach(function(h){normSet.add(h)});
            }
            break;
        }
    }
    result.normalIcons=Array.from(normSet).sort();

    // ---- Detect if payout values exist in document ----
    result.hasPayoutValues=false;
    result.payoutData=[];
    for(var i=0;i<allLines.length;i++){
        var line=allLines[i];
        // Look for payout patterns like "5 - 120" or "5-120" or specific value rows
        if(/\d\s*[-–]\s*\d/.test(line)&&/[HL]\d|H\d|L\d/.test(allLines[Math.max(0,i-3)]||'')){
            result.hasPayoutValues=true;
            break;
        }
        // Also check for "分值" rows with actual numbers
        if(line.includes('分值')&&i+1<allLines.length){
            var nextLine=allLines[i+1]||'';
            if(/\d+\s*[-–]\s*\d+/.test(nextLine)){
                result.hasPayoutValues=true;
                break;
            }
        }
    }

    // ---- 3. Feature extraction with buff separation ----
    // Known feature name patterns from all existing gameplay documents
    var knownFeatureNames=['BASE玩法','Base玩法','base玩法','FG玩法','FG-BONUS玩法','FG-JACKPOT玩法','FG-升行玩法','FG1-EXPAND玩法','FG2-REPEAT玩法','FG3-JACKPOT玩法','FireLink玩法','PICK玩法','Respin玩法','SUPER FREE玩法','bonus玩法','bonus连续列玩法','fg通用玩法','free games','free玩法','respin玩法','super转盘玩法','wheel玩法','三小收集区触发free games','三种多福多彩玩法','再触发玩法','地图玩法','大收集区pick玩法','开门玩法','组合触发玩法','转盘玩法','连续列玩法','长线玩法','高低Bet玩法','高低bet玩法','普通respin玩法','普通转盘玩法','收集玩法','升级转盘玩法'];
    var featureHeaders=[
        {pattern:/BASE.*(?:玩法|WILD|wild)/i, priority:1},
        {pattern:/base下.*WILD|WILD.*变整列|整列wild/i, priority:2},
        {pattern:/RESPIN.*玩法|RESPIN\s*GAME/i, priority:1},
        {pattern:/Respin-buff\d|Respin.*buff/i, priority:2},
        {pattern:/FREE\s*(?:GAMES?|SPIN)|FG.*玩法/i, priority:1},
        {pattern:/普通转盘.*玩法|普通.*WHEEL/i, priority:1},
        {pattern:/转盘.*玩法|WHEEL.*(?:玩法|feature)/i, priority:1},
        {pattern:/收集.*玩法|升级.*(?:转盘|玩法)|UPGRADE|super.*转盘|SUPER.*WHEEL/i, priority:1},
        {pattern:/JACKPOT.*玩法/i, priority:1},
        {pattern:/PICK.*玩法/i, priority:1},
        {pattern:/LINK\s*GAME/i, priority:1},
        {pattern:/super.*RESPIN|SUPER.*FREE/i, priority:2},
        {pattern:/高低.*[Bb]et|高低bet/i, priority:1}
    ];

    var skipPatterns=[/极限情况/,/断线重连/,/美术.*重点/,/美术设计/,/设计要点/,/参考图标/,/分值/,/实体机/,/竞品/,/图标等级/,/图标设计[：:]/,/重点图标/,/图标列表/,/普通图标/];

    var currentFeature=null;
    var inTrigger=false;
    var inRules=false;
    var inEnd=false;
    var inSkipBlock=false;
    var wheelRewards=[];

    for(var i=0;i<allLines.length;i++){
        var line=allLines[i].trim();
        if(!line) continue;

        // Check skip patterns - enter skip mode
        var shouldSkip=false;
        skipPatterns.forEach(function(p){if(p.test(line))shouldSkip=true});
        if(shouldSkip){
            inSkipBlock=true;inTrigger=false;inRules=false;inEnd=false;
            continue;
        }

        // Exit skip block when hitting a new feature header
        var matchedHeader=null;
        featureHeaders.forEach(function(fh){
            if(fh.pattern.test(line)&&line.length<80) matchedHeader=fh;
        });

        // Also detect generic feature headers and known feature names
        if(!matchedHeader&&/^[A-Za-z\u4e00-\u9fff\s]+(?:玩法|GAME)[：:\s]*$/i.test(line)&&line.length<50){
            matchedHeader={pattern:null,priority:1};
        }
        // Check against known feature names database
        if(!matchedHeader){
            var lineTrimmed=line.replace(/[：:]\s*$/,'').trim();
            if(knownFeatureNames.some(function(kn){return lineTrimmed===kn||lineTrimmed.includes(kn)||kn.includes(lineTrimmed)})&&line.length<60){
                matchedHeader={pattern:null,priority:1};
            }
        }

        if(matchedHeader){
            inSkipBlock=false;
            // Save previous feature
            if(currentFeature&&(currentFeature.rules.length>0||currentFeature.trigger)){
                result.features.push(currentFeature);
            }
            var featureName=line.replace(/[:：]\s*$/,'').replace(/^\s*玩法说明[：:]\s*/,'').trim();
            currentFeature={name:featureName,trigger:'',rules:[],endCondition:'',wheelRewards:[]};
            inTrigger=false;inRules=false;inEnd=false;
            continue;
        }

        if(inSkipBlock) continue;
        if(!currentFeature) continue;

        // Sub-section detection
        if(/^触发条件[：:]?\s*$/.test(line)||line==='触发条件：'){inTrigger=true;inRules=false;inEnd=false;continue}
        if(/^玩法说明[：:]?\s*$/.test(line)||line==='玩法说明：'){inRules=true;inTrigger=false;inEnd=false;continue}
        if(/^结束条件[：:]?\s*$/.test(line)||line==='结束条件：'){inEnd=true;inTrigger=false;inRules=false;continue}

        // Detect "Respin-buff" as a NEW separate feature
        var buffMatch=line.match(/^Respin-buff(\d+)[：:]\s*(.+)/i);
        if(buffMatch){
            // Save current feature first
            if(currentFeature&&(currentFeature.rules.length>0||currentFeature.trigger)){
                result.features.push(currentFeature);
            }
            currentFeature={name:'RESPIN - BUFF'+buffMatch[1]+' ('+buffMatch[2].trim()+')',trigger:'',rules:[],endCondition:'',wheelRewards:[]};
            inRules=true;inTrigger=false;inEnd=false;
            continue;
        }

        // Detect wheel reward list items (e.g. "2X 双棋盘" or "GRAND")
        if(currentFeature.name.includes('转盘')||currentFeature.name.includes('WHEEL')){
            if(/^\d+X\s|^[A-Z]+\s*$/.test(line)||(line.match(/[+＋]/)&&line.match(/[XxＸ]/i))){
                currentFeature.wheelRewards.push(line);
                continue;
            }
        }

        // Clean line - remove leading numbers/bullets
        var cleanLine=line.replace(/^[\d]+[、.\s）)]+/,'').trim();
        if(!cleanLine) continue;

        // Filter out pure design descriptions
        if(isDesignDesc(cleanLine)&&!isFunctionalDesc(cleanLine)) continue;

        // Collect into appropriate section
        if(inTrigger){
            if(currentFeature.trigger) currentFeature.trigger+='\n'+cleanLine;
            else currentFeature.trigger=cleanLine;
        }else if(inEnd){
            if(currentFeature.endCondition) currentFeature.endCondition+='\n'+cleanLine;
            else currentFeature.endCondition=cleanLine;
        }else{
            // Default: rules (also when inRules=true or just after header)
            currentFeature.rules.push(cleanLine);
        }
    }
    // Push last feature
    if(currentFeature&&(currentFeature.rules.length>0||currentFeature.trigger)){
        result.features.push(currentFeature);
    }

    // ---- 4. Post-processing ----
    // Remove empty features
    result.features=result.features.filter(function(f){
        return f.rules.length>0||f.trigger||f.wheelRewards.length>0;
    });

    // Merge wheel rewards into rules for AI prompt
    result.features.forEach(function(f){
        if(f.wheelRewards.length>0){
            f.rules.push('转盘奖励列表：'+f.wheelRewards.join(' | '));
        }
    });

    return result;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ========== ICON IMAGE MANAGEMENT ==========
function detectIconsFromPages(){
    var icons=new Set();
    var pattern=/\[([A-Z][A-Z0-9_\s]*)\]/g;
    paytableData.pages.forEach(function(page){
        page.items.forEach(function(item){
            var m;
            while((m=pattern.exec(item.cn||''))!==null) icons.add(m[1].trim());
            pattern.lastIndex=0;
            while((m=pattern.exec(item.en||''))!==null) icons.add(m[1].trim());
            pattern.lastIndex=0;
        });
    });
    // Also add H1-H5, L1-L6 from PAYS page
    paytableData.pages.forEach(function(page){
        if((page.titleEn||'').toUpperCase()==='PAYS'||(page.title||'').includes('赔付')){
            page.items.forEach(function(item){
                var hm=(item.cn||'').match(/[HL]\d/g);
                if(hm) hm.forEach(function(h){icons.add(h)});
            });
        }
    });
    return Array.from(icons).sort();
}

function renderIconUploadArea(){
    var icons=detectIconsFromPages();
    if(!icons.length){
        document.getElementById('iconUploadArea').innerHTML='<div style="color:#8892b0;font-size:.82rem">未检测到图标引用</div>';
        return;
    }
    var html='<div class="icon-upload-grid">';
    icons.forEach(function(name){
        var hasImg=iconImages[name]?'has-image':'';
        var imgContent=iconImages[name]?'<img src="'+iconImages[name]+'" alt="'+name+'">':'<div class="placeholder">点击/拖拽<br>添加图片</div>';
        html+='<div class="icon-upload-item '+hasImg+'" data-icon="'+name+'">';
        html+='<div class="icon-name">'+name+'</div>';
        html+='<div class="icon-drop" data-icon="'+name+'" ondragover="iconDragOver(event)" ondragleave="iconDragLeave(event)" ondrop="iconDrop(event,\''+name+'\')">';
        html+=imgContent;
        html+='<input type="file" accept="image/*" onchange="iconFileChange(this,\''+name+'\')">';
        html+='</div></div>';
    });
    html+='</div>';
    document.getElementById('iconUploadArea').innerHTML=html;
}

function iconDragOver(e){e.preventDefault();e.currentTarget.classList.add('dragover')}
function iconDragLeave(e){e.currentTarget.classList.remove('dragover')}
function iconDrop(e,name){
    e.preventDefault();e.currentTarget.classList.remove('dragover');
    var file=e.dataTransfer.files[0];
    if(file&&file.type.startsWith('image/')) readIconFile(file,name);
}
function iconFileChange(input,name){
    var file=input.files[0];
    if(file) readIconFile(file,name);
}
function readIconFile(file,name){
    var reader=new FileReader();
    reader.onload=function(ev){
        iconImages[name]=ev.target.result;
        renderIconUploadArea();
        renderPreview();
    };
    reader.readAsDataURL(file);
}

function renderPreview(){
    var html='';
    paytableData.pages.forEach(function(page,pi){
        html+='<div style="margin-bottom:16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden">';
        html+='<div style="padding:10px 14px;background:rgba(247,151,30,.1);display:flex;justify-content:space-between;align-items:center">';
        html+='<span style="font-weight:700;color:#ffd200;font-size:.9rem">第'+(pi+1)+'页 / Page '+(pi+1)+'</span>';
        html+='</div>';
        html+='<div style="padding:12px 14px;background:rgba(255,255,255,.02);text-align:center;border-bottom:1px solid rgba(255,255,255,.06)">';
        html+='<div style="font-weight:700;color:#ccd6f6;font-size:.95rem">'+(page.title||'')+'</div>';
        html+='<div style="font-weight:600;color:#8892b0;font-size:.85rem;font-style:italic;margin-top:2px">'+(page.titleEn||'')+'</div>';
        html+='</div>';
        html+='<table class="preview-table" style="margin:0"><thead><tr><th style="width:50%">中文内容</th><th style="width:50%">English Translation</th></tr></thead><tbody>';
        page.items.forEach(function(item){
            html+='<tr><td style="color:#e0e0e0;white-space:pre-wrap;font-size:.82rem;line-height:1.5">'+inlineIcons(escHtml(item.cn||''))+'</td>';
            html+='<td style="color:#8892b0;white-space:pre-wrap;font-style:italic;font-size:.82rem;line-height:1.5">'+inlineIcons(escHtml(item.en||''))+'</td></tr>';
        });
        html+='</tbody></table></div>';
    });
    if(!html) html='<div style="text-align:center;padding:40px;color:#8892b0">暂无内容，请先生成Paytable</div>';
    document.getElementById('previewWrap').innerHTML=html;
}

// Replace [ICON_NAME] in preview text with inline images if available
function inlineIcons(text){
    return text.replace(/\[([A-Z][A-Z0-9_\s]*)\]/g,function(match,name){
        var trimmed=name.trim();
        if(iconImages[trimmed]){
            return '<img class="preview-icon-img" src="'+iconImages[trimmed]+'" title="'+trimmed+'"> ';
        }
        return match;
    });
}

async function exportExcel(){
    if(!paytableData.pages.length){alert('没有可导出的内容，请先生成Paytable');return}
    try{
        var wb=new ExcelJS.Workbook();
        var ws=wb.addWorksheet('paytable_市场');
        ws.columns=[{width:4},{width:50},{width:4},{width:50}];
        var bf={name:'Microsoft YaHei',size:11};
        var bld={name:'Microsoft YaHei',size:11,bold:true};
        var tf={name:'Microsoft YaHei',size:14,bold:true};
        var pageTf={name:'Microsoft YaHei',size:16,bold:true};
        var redFont={name:'Microsoft YaHei',size:10,color:{argb:'FFFF0000'}};
        var al={vertical:'middle',horizontal:'left',wrapText:true};
        var alc={vertical:'middle',horizontal:'center',wrapText:true};
        var r=1;

        // Add icon images to workbook
        var iconImageIds={};
        Object.keys(iconImages).forEach(function(name){
            if(iconImages[name]){
                try{
                    var base64=iconImages[name].split(',')[1];
                    var ext=iconImages[name].match(/data:image\/(\w+)/);
                    iconImageIds[name]=wb.addImage({base64:base64,extension:ext?ext[1]:'png'});
                }catch(e){}
            }
        });

        // Document title
        ws.mergeCells('A'+r+':B'+r);
        ws.getCell('A'+r).value=paytableData.brand+paytableData.name+'：paytable需求';
        ws.getCell('A'+r).font=pageTf;
        ws.mergeCells('C'+r+':D'+r);
        ws.getCell('C'+r).value='翻译（增删改查此列翻译）';
        ws.getCell('C'+r).font=redFont;
        ws.getRow(r).height=30;r++;r++;

        paytableData.pages.forEach(function(page,pi){
            // Page separator
            ws.mergeCells('A'+r+':B'+r);
            ws.getCell('A'+r).value='第'+(pi+1)+'页';
            ws.getCell('A'+r).font=bld;
            ws.getCell('A'+r).alignment=alc;
            ws.getCell('A'+r).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
            ws.mergeCells('C'+r+':D'+r);
            ws.getCell('C'+r).value='Page '+(pi+1);
            ws.getCell('C'+r).font=bld;
            ws.getCell('C'+r).alignment=alc;
            ws.getCell('C'+r).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
            ws.getRow(r).height=20;r++;

            // Page title
            ws.mergeCells('A'+r+':B'+r);
            ws.getCell('A'+r).value=page.title||'';
            ws.getCell('A'+r).font=tf;
            ws.getCell('A'+r).alignment=alc;
            ws.mergeCells('C'+r+':D'+r);
            ws.getCell('C'+r).value=page.titleEn||'';
            ws.getCell('C'+r).font=tf;
            ws.getCell('C'+r).alignment=alc;
            ws.getRow(r).height=26;r++;

            // Check if this is FEATURE or PAYS page - embed icon images
            var isFeaturePage=(page.titleEn||'').toUpperCase()==='FEATURE'||(page.titleEn||'').toUpperCase()==='PAYS';

            page.items.forEach(function(item){
                var cnText=item.cn||'';
                var enText=item.en||'';
                var cnLines=cnText.split('\n');
                var maxL=Math.max(cnLines.length,1);

                // Find icon references in this item
                var referencedIcons=[];
                var iconPattern=/\[([A-Z][A-Z0-9_\s]*)\]/g;
                var m;
                while((m=iconPattern.exec(cnText))!==null){
                    var iname=m[1].trim();
                    if(iconImageIds[iname]&&referencedIcons.indexOf(iname)===-1) referencedIcons.push(iname);
                }
                iconPattern.lastIndex=0;

                // If icons found and on FEATURE/PAYS page, add image in col A
                if(referencedIcons.length&&isFeaturePage){
                    var firstIcon=referencedIcons[0];
                    ws.getRow(r).height=Math.max(50,maxL*15);
                    try{
                        ws.addImage(iconImageIds[firstIcon],{
                            tl:{col:0,row:r-1},
                            ext:{width:45,height:45}
                        });
                    }catch(e){}
                }else{
                    ws.getRow(r).height=Math.max(18,maxL*15);
                }

                ws.getCell('B'+r).value=cnText;
                ws.getCell('B'+r).font=bf;
                ws.getCell('B'+r).alignment=al;
                ws.getCell('D'+r).value=enText;
                ws.getCell('D'+r).font=bf;
                ws.getCell('D'+r).alignment=al;
                r++;
            });
            ws.getRow(r).height=10;r++;
        });

        var buf=await wb.xlsx.writeBuffer();
        var filename=paytableData.brand+paytableData.name+'：paytable需求文档.xlsx';
        saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),filename);
        showToast('✅ Paytable文档已下载！');
    }catch(err){alert('导出失败：'+err.message)}
}

document.addEventListener('DOMContentLoaded',function(){
    var ua=document.getElementById('uploadArea');
    if(ua){
        ua.addEventListener('dragover',function(e){e.preventDefault();ua.classList.add('dragover')});
        ua.addEventListener('dragleave',function(){ua.classList.remove('dragover')});
        ua.addEventListener('drop',function(e){e.preventDefault();ua.classList.remove('dragover');
            var f=e.dataTransfer.files[0];if(f){var dt=new DataTransfer();dt.items.add(f);ua.querySelector('input').files=dt.files;handleFileUpload(ua.querySelector('input'))}
        });
    }
});
