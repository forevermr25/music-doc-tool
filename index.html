<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老虎机需求文档工具集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; padding: 60px 20px; color: #e0e0e0;
            display: flex; align-items: center; justify-content: center;
        }
        .container { max-width: 700px; width: 100%; text-align: center; }
        h1 {
            font-size: 2.2rem; margin-bottom: 12px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: #8892b0; margin-bottom: 50px; font-size: 1rem; }
        .tools { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
        .tool-card {
            flex: 1; min-width: 260px; max-width: 320px; padding: 40px 30px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; backdrop-filter: blur(10px);
            text-decoration: none; color: inherit;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
        }
        .tool-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(247,151,30,0.15);
            border-color: rgba(247,151,30,0.4);
        }
        .tool-icon { font-size: 3rem; margin-bottom: 16px; }
        .tool-title { font-size: 1.2rem; font-weight: 700; color: #ccd6f6; margin-bottom: 10px; }
        .tool-desc { font-size: 0.88rem; color: #8892b0; line-height: 1.6; }
        .footer { margin-top: 50px; font-size: 0.8rem; color: #4a5568; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 老虎机需求文档工具集</h1>
        <p class="subtitle">AI 驱动 · 免费 · 无需注册 · 快速生成需求文档</p>
        <div class="tools">
            <a class="tool-card" href="./music/">
                <div class="tool-icon">🎵</div>
                <div class="tool-title">配乐需求文档生成器</div>
                <div class="tool-desc">输入主题名称，AI自动生成各段配乐的情绪描述，导出标准化Excel文档</div>
            </a>
            <a class="tool-card" href="./voice/">
                <div class="tool-icon">🎙️</div>
                <div class="tool-title">配音需求文档生成器</div>
                <div class="tool-desc">选择音色和场景，AI自动生成中英文配音台词，导出标准化Excel文档</div>
            </a>
        </div>
        <p class="footer">CTS Slot Game Tools</p>
    </div>
</body>
</html>
